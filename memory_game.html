<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>메모리 게임</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
  }

  body {
    background: #1a1a2e;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 8px 10px;
    font-family: 'Arial', sans-serif;
    color: white;
    user-select: none;
    touch-action: manipulation;
  }

  h1 {
    font-size: clamp(16px, 4.5vw, 24px);
    color: #e94560;
    margin-bottom: 6px;
    letter-spacing: 1px;
  }

  /* 상단 HUD */
  .hud {
    display: flex;
    gap: 8px;
    margin-bottom: 8px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .hud-box {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 12px;
    padding: 4px 14px;
    text-align: center;
    min-width: 70px;
  }

  .hud-label {
    font-size: 10px;
    color: #aaa;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .hud-value {
    font-size: clamp(18px, 5vw, 24px);
    font-weight: bold;
    color: #e94560;
  }

  /* 난이도 버튼 */
  .difficulty {
    display: flex;
    gap: 6px;
    margin-bottom: 8px;
  }

  .diff-btn {
    background: rgba(255,255,255,0.08);
    border: 2px solid transparent;
    color: #ccc;
    font-size: clamp(12px, 3.5vw, 14px);
    font-weight: bold;
    border-radius: 20px;
    padding: 6px 16px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .diff-btn.active {
    border-color: #e94560;
    color: #e94560;
    background: rgba(233,69,96,0.12);
  }

  /* 카드 그리드 */
  #grid {
    display: grid;
    gap: clamp(4px, 1.5vw, 8px);
    width: 100%;
    max-width: min(96vw, calc((100vh - 180px) * 1.5));
    flex: 1;
    align-content: center;
  }

  .card {
    aspect-ratio: 1;
    cursor: pointer;
    perspective: 600px;
    border-radius: 12px;
  }

  .card-inner {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    border-radius: 12px;
  }

  .card.flipped .card-inner,
  .card.matched .card-inner {
    transform: rotateY(180deg);
  }

  .card-front,
  .card-back {
    position: absolute;
    width: 100%;
    height: 100%;
    border-radius: 12px;
    backface-visibility: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .card-front {
    background: linear-gradient(135deg, #0f3460 0%, #16213e 100%);
    border: 2px solid rgba(255,255,255,0.1);
    font-size: clamp(28px, 11vw, 65px);
    color: rgba(255,255,255,0.2);
  }

  .card-front::after {
    content: '?';
    font-size: clamp(26px, 10vw, 60px);
    font-weight: bold;
  }

  .card-back {
    background: linear-gradient(135deg, #e94560 0%, #c0392b 100%);
    border: 2px solid rgba(255,100,100,0.4);
    transform: rotateY(180deg);
    font-size: clamp(32px, 14vw, 75px);
  }

  .card.matched .card-back {
    background: linear-gradient(135deg, #27ae60 0%, #1e8449 100%);
    border-color: rgba(100,255,150,0.4);
    animation: matchPop 0.3s ease forwards;
  }

  @keyframes matchPop {
    0%   { transform: rotateY(180deg) scale(1); }
    50%  { transform: rotateY(180deg) scale(1.12); }
    100% { transform: rotateY(180deg) scale(1); }
  }

  .card:not(.flipped):not(.matched):active .card-inner {
    transform: scale(0.93);
  }

  /* 완료 오버레이 */
  #overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    align-items: center;
    justify-content: center;
    z-index: 100;
    animation: fadeIn 0.3s ease;
  }

  #overlay.show {
    display: flex;
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  .result-box {
    background: #16213e;
    border: 2px solid #e94560;
    border-radius: 20px;
    padding: 32px 40px;
    text-align: center;
    max-width: 320px;
    width: 90%;
    animation: popIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  @keyframes popIn {
    from { transform: scale(0.7); opacity: 0; }
    to   { transform: scale(1);   opacity: 1; }
  }

  .result-box h2 {
    font-size: 36px;
    color: #e94560;
    margin-bottom: 8px;
  }

  .result-box .result-emoji {
    font-size: 52px;
    margin-bottom: 12px;
  }

  .result-stats {
    font-size: 16px;
    color: #ccc;
    margin-bottom: 6px;
  }

  .result-stats span {
    color: white;
    font-weight: bold;
  }

  .play-again-btn {
    margin-top: 20px;
    background: #e94560;
    color: white;
    font-size: 16px;
    font-weight: bold;
    border: none;
    border-radius: 30px;
    padding: 12px 36px;
    cursor: pointer;
    letter-spacing: 1px;
    transition: transform 0.15s;
  }

  .play-again-btn:active { transform: scale(0.95); }

  .overlay-page { width: 100%; display: flex; flex-direction: column; align-items: center; }

  .pick-label {
    color: #aaa; font-size: 14px; margin: 10px 0 14px;
  }

  .name-buttons {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    width: 100%;
  }

  .name-btn {
    background: linear-gradient(135deg, #e94560, #c0392b);
    color: white;
    font-size: 17px;
    font-weight: bold;
    border: none;
    border-radius: 12px;
    padding: 14px 10px;
    cursor: pointer;
    transition: transform 0.15s;
  }

  .name-btn:nth-child(2) { background: linear-gradient(135deg, #8e44ad, #6c3483); }
  .name-btn:nth-child(3) { background: linear-gradient(135deg, #27ae60, #1e8449); }
  .name-btn:nth-child(4) { background: linear-gradient(135deg, #e67e22, #d35400); }
  .name-btn:active { transform: scale(0.95); }

  .ranking-title {
    font-size: 22px; font-weight: bold; color: #f1c40f;
    margin-bottom: 12px;
  }

  .ranking-table {
    width: 100%; border-collapse: collapse; margin-bottom: 14px;
    font-size: 13px;
  }

  .ranking-table th {
    color: #aaa; padding: 4px 6px; border-bottom: 1px solid rgba(255,255,255,0.1);
    text-align: left;
  }

  .ranking-table td {
    padding: 6px 6px; border-bottom: 1px solid rgba(255,255,255,0.06);
    color: white;
  }

  .ranking-table tr:first-child td { color: #f1c40f; font-weight: bold; }
  .ranking-table tr:nth-child(2) td { color: #bdc3c7; }
  .ranking-table tr:nth-child(3) td { color: #cd6133; }

  .rank-tabs {
    display: flex; gap: 6px; margin-bottom: 12px; width: 100%;
  }
  .rank-tab {
    flex: 1; padding: 7px 0; font-size: 13px; font-weight: bold;
    border: 2px solid rgba(255,255,255,0.15); border-radius: 20px;
    background: transparent; color: #aaa; cursor: pointer;
    transition: all 0.18s;
  }
  .rank-tab.active {
    border-color: #f1c40f; color: #f1c40f;
    background: rgba(241,196,15,0.12);
  }
</style>
</head>
<body>

<h1>🧠 메모리 게임</h1>

<div class="hud">
  <div class="hud-box">
    <div class="hud-label">시간</div>
    <div class="hud-value" id="timer">0</div>
  </div>
  <div class="hud-box">
    <div class="hud-label">시도</div>
    <div class="hud-value" id="moves">0</div>
  </div>
  <div class="hud-box">
    <div class="hud-label">매칭</div>
    <div class="hud-value" id="matched">0</div>
  </div>
</div>

<div class="difficulty" style="align-items:center">
  <button class="diff-btn active" data-level="easy">쉬움 (4×3)</button>
  <button class="diff-btn" data-level="medium">보통 (4×4)</button>
  <button class="diff-btn" data-level="hard">어려움 (5×4)</button>
  <button id="ranking-btn" style="background:rgba(241,196,15,0.15);border:2px solid #f1c40f;color:#f1c40f;font-size:clamp(11px,3vw,13px);font-weight:bold;border-radius:20px;padding:6px 14px;cursor:pointer">🏆 랭킹</button>
</div>

<div id="grid"></div>

<div id="overlay">
  <div class="result-box">

    <!-- 이름 선택 -->
    <div class="overlay-page" id="page-name">
      <div class="result-emoji" id="res-emoji">🎉</div>
      <h2>완료!</h2>
      <p class="result-stats" style="margin-bottom:4px">
        ⏱ <span id="res-time">-</span> &nbsp;|&nbsp;
        🔄 <span id="res-moves">-</span>번 &nbsp;|&nbsp;
        🏅 <span id="res-grade">-</span>
      </p>
      <p class="pick-label">이름을 선택하세요</p>
      <div class="name-buttons">
        <button class="name-btn" data-name="유빵꾸">유빵꾸</button>
        <button class="name-btn" data-name="유똥꼬">유똥꼬</button>
        <button class="name-btn" data-name="유똥">유똥</button>
        <button class="name-btn" data-name="조똥">조똥</button>
      </div>
    </div>

    <!-- 랭킹 -->
    <div class="overlay-page" id="page-ranking" style="display:none">
      <div class="ranking-title">🏆 명예의 전당</div>
      <div class="rank-tabs">
        <button class="rank-tab active" data-rank-level="easy">쉬움</button>
        <button class="rank-tab" data-rank-level="medium">보통</button>
        <button class="rank-tab" data-rank-level="hard">어려움</button>
      </div>
      <table class="ranking-table">
        <thead>
          <tr><th>#</th><th>이름</th><th>시간</th><th>시도</th><th>등급</th></tr>
        </thead>
        <tbody id="ranking-body"></tbody>
      </table>
      <button class="play-again-btn" id="play-again">다시 하기</button>
    </div>

  </div>
</div>

<script>
const LEVELS = {
  easy:   { cols: 4, rows: 3 },
  medium: { cols: 4, rows: 4 },
  hard:   { cols: 5, rows: 4 },
};

const EMOJI_POOL = [
  '🐶','🐱','🐭','🐹','🐰','🦊','🐻','🐼',
  '🐨','🐯','🦁','🐸','🐙','🦋','🐬','🦄',
  '🍎','🍊','🍋','🍇','🍓','🍒','🥝','🍉',
  '⚽','🎸','🚀','🌈','🎯','💎','🔥','❄️',
];

let level = 'easy';
let cards = [];
let flipped = [];
let matchedCount = 0;
let moves = 0;
let timerInterval = null;
let seconds = 0;
let locked = false;
let totalPairs = 0;
let timerStarted = false;
let pendingResult = null; // 이름 선택 전 임시 결과

// 랭킹 localStorage
function getMemRankings() {
  try { return JSON.parse(localStorage.getItem('memoryRank') || '[]'); }
  catch { return []; }
}
function saveMemRanking(name, result) {
  const list = getMemRankings();
  list.push({ name, ...result, date: new Date().toLocaleDateString('ko-KR') });
  list.sort((a, b) => {
    if (a.grade !== b.grade) return ['S','A','B','C'].indexOf(a.grade) - ['S','A','B','C'].indexOf(b.grade);
    return a.seconds - b.seconds;
  });
  localStorage.setItem('memoryRank', JSON.stringify(list.slice(0, 10)));
}
let currentRankLevel = 'easy';

function renderRanking(filterLevel) {
  if (filterLevel) currentRankLevel = filterLevel;
  const levelLabel = { easy: '쉬움', medium: '보통', hard: '어려움' };

  // 탭 활성화
  document.querySelectorAll('.rank-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.rankLevel === currentRankLevel);
  });

  const all = getMemRankings();
  const list = all.filter(e => e.level === levelLabel[currentRankLevel]);
  const medals = ['🥇','🥈','🥉'];
  const tbody = document.getElementById('ranking-body');
  tbody.innerHTML = list.length === 0
    ? '<tr><td colspan="5" style="text-align:center;color:#666;padding:16px">아직 기록이 없어요</td></tr>'
    : list.map((e, i) => `<tr>
        <td>${medals[i] || i+1}</td>
        <td>${e.name}</td>
        <td>${formatTime(e.seconds)}</td>
        <td>${e.moves}번</td>
        <td>${e.grade}</td>
      </tr>`).join('');
}

// 랭킹 탭 클릭
document.addEventListener('click', e => {
  if (e.target.classList.contains('rank-tab')) {
    renderRanking(e.target.dataset.rankLevel);
  }
});

// 이름 선택 버튼
document.querySelectorAll('.name-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    if (!pendingResult) return;
    saveMemRanking(btn.dataset.name, pendingResult);
    document.getElementById('page-name').style.display = 'none';
    renderRanking(level);
    document.getElementById('page-ranking').style.display = 'flex';
  });
});

// 난이도 버튼
document.querySelectorAll('.diff-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    level = btn.dataset.level;
    startGame();
  });
});

document.getElementById('ranking-btn').addEventListener('click', () => {
  renderRanking(level);
  document.getElementById('page-name').style.display = 'none';
  document.getElementById('page-ranking').style.display = 'flex';
  document.getElementById('overlay').classList.add('show');
});

document.getElementById('play-again').addEventListener('click', () => {
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('page-name').style.display = 'flex';
  document.getElementById('page-ranking').style.display = 'none';
  startGame();
});

function startGame() {
  clearInterval(timerInterval);
  seconds = 0;
  moves = 0;
  matchedCount = 0;
  flipped = [];
  locked = false;

  updateHUD();

  const { cols, rows } = LEVELS[level];
  totalPairs = (cols * rows) / 2;

  // 이모지 섞기
  const pool = [...EMOJI_POOL].sort(() => Math.random() - 0.5).slice(0, totalPairs);
  const deck = [...pool, ...pool].sort(() => Math.random() - 0.5);

  // 그리드 렌더링
  const grid = document.getElementById('grid');
  grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
  grid.innerHTML = '';

  cards = deck.map((emoji, i) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="card-inner">
        <div class="card-front"></div>
        <div class="card-back">${emoji}</div>
      </div>`;
    card.dataset.emoji = emoji;
    card.dataset.index = i;
    card.addEventListener('click', () => onCardClick(card));
    card.addEventListener('touchend', e => { e.preventDefault(); onCardClick(card); });
    grid.appendChild(card);
    return card;
  });

  // 타이머는 첫 카드 클릭 시 시작
  timerStarted = false;
}

function onCardClick(card) {
  if (locked) return;
  if (card.classList.contains('flipped') || card.classList.contains('matched')) return;

  // 첫 카드 클릭 시 타이머 시작
  if (!timerStarted) {
    timerStarted = true;
    timerInterval = setInterval(() => {
      seconds++;
      document.getElementById('timer').textContent = formatTime(seconds);
    }, 1000);
  }

  card.classList.add('flipped');
  flipped.push(card);

  if (flipped.length === 2) {
    locked = true;
    moves++;
    document.getElementById('moves').textContent = moves;
    checkMatch();
  }
}

function checkMatch() {
  const [a, b] = flipped;
  if (a.dataset.emoji === b.dataset.emoji) {
    // 매칭 성공
    setTimeout(() => {
      a.classList.add('matched');
      b.classList.add('matched');
      flipped = [];
      locked = false;
      matchedCount++;
      document.getElementById('matched').textContent = matchedCount;
      if (matchedCount === totalPairs) gameComplete();
    }, 300);
  } else {
    // 매칭 실패 - 다시 뒤집기
    setTimeout(() => {
      a.classList.remove('flipped');
      b.classList.remove('flipped');
      flipped = [];
      locked = false;
    }, 900);
  }
}

function gameComplete() {
  clearInterval(timerInterval);

  // 시도 효율 + 시간 모두 반영
  // moveRatio: 1.0 = 완벽, 0.5 = 2배 시도
  const moveRatio = totalPairs / moves;
  // 페어당 평균 시간 (초)
  const secPerPair = seconds / totalPairs;
  let grade, emoji;
  if (moveRatio >= 0.6 && secPerPair <= 8)      { grade = 'S'; emoji = '🏆'; } // 빠르고 정확
  else if (moveRatio >= 0.5 || secPerPair <= 12) { grade = 'A'; emoji = '⭐'; } // 하나라도 잘함
  else if (moveRatio >= 0.33)                    { grade = 'B'; emoji = '👍'; } // 평균
  else                                           { grade = 'C'; emoji = '🙂'; }

  const levelLabel = { easy: '쉬움', medium: '보통', hard: '어려움' }[level];
  pendingResult = { seconds, moves, grade, level: levelLabel };

  document.getElementById('res-emoji').textContent = emoji;
  document.getElementById('res-time').textContent = formatTime(seconds);
  document.getElementById('res-moves').textContent = moves;
  document.getElementById('res-grade').textContent = grade;

  setTimeout(() => {
    document.getElementById('overlay').classList.add('show');
  }, 400);
}

function updateHUD() {
  document.getElementById('timer').textContent = formatTime(seconds);
  document.getElementById('moves').textContent = moves;
  document.getElementById('matched').textContent = matchedCount;
}

function formatTime(s) {
  const m = Math.floor(s / 60);
  const sec = s % 60;
  return m > 0 ? `${m}:${String(sec).padStart(2,'0')}` : `${sec}s`;
}

// 시작
startGame();
</script>
</body>
</html>
