<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>⚡ 반응속도 배틀</title>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%; height: 100%;
  background: #1a1a2e;
  font-family: 'Arial', sans-serif;
  color: white;
  user-select: none;
  overflow: hidden;
  touch-action: manipulation;
}

.screen {
  display: none;
  position: fixed; inset: 0;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 20px;
  text-align: center;
}
.screen.active { display: flex; }

/* ── JOIN SCREEN ── */
#screen-join h1 { font-size: 48px; margin-bottom: 4px; }
#screen-join p  { color: #aaa; margin-bottom: 32px; font-size: 15px; }

.input-group { width: 100%; max-width: 300px; margin-bottom: 14px; }
.input-group label { display: block; font-size: 12px; color: #aaa; text-align: left; margin-bottom: 5px; letter-spacing: 1px; text-transform: uppercase; }
.input-group input {
  width: 100%;
  background: rgba(255,255,255,0.08);
  border: 2px solid rgba(255,255,255,0.15);
  border-radius: 12px;
  color: white;
  font-size: 18px;
  padding: 12px 16px;
  outline: none;
  text-transform: uppercase;
  letter-spacing: 2px;
}
.input-group input:focus { border-color: #e94560; }
.input-group input[type="text"]:first-child { text-transform: none; letter-spacing: normal; }

.btn {
  width: 100%; max-width: 300px;
  padding: 14px;
  border: none; border-radius: 14px;
  font-size: 17px; font-weight: bold;
  cursor: pointer;
  transition: transform 0.12s;
  margin-bottom: 10px;
}
.btn:active { transform: scale(0.96); }
.btn-primary { background: #e94560; color: white; }
.btn-secondary { background: rgba(255,255,255,0.1); color: white; border: 2px solid rgba(255,255,255,0.2); }
.btn-green { background: #27ae60; color: white; }
.btn-gold { background: #f1c40f; color: #1a1a2e; }

.divider {
  max-width: 300px; width: 100%;
  display: flex; align-items: center; gap: 12px;
  margin: 6px 0 16px;
  color: #555; font-size: 13px;
}
.divider::before, .divider::after {
  content: ''; flex: 1; height: 1px; background: rgba(255,255,255,0.1);
}

/* ── LOBBY SCREEN ── */
#screen-lobby h2 { font-size: 28px; margin-bottom: 6px; }
.room-code-display {
  font-size: 52px; font-weight: bold; color: #f1c40f;
  letter-spacing: 8px; margin: 10px 0 4px;
}
.room-code-hint { font-size: 13px; color: #666; margin-bottom: 20px; }

.player-list {
  width: 100%; max-width: 320px;
  background: rgba(255,255,255,0.05);
  border-radius: 14px;
  padding: 8px;
  margin-bottom: 20px;
}
.player-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px;
  border-radius: 10px;
}
.player-item + .player-item { border-top: 1px solid rgba(255,255,255,0.05); }
.player-item .avatar { font-size: 26px; }
.player-item .pname { font-size: 16px; font-weight: bold; }
.player-item .host-badge {
  font-size: 11px; background: #f1c40f; color: #1a1a2e;
  padding: 2px 7px; border-radius: 8px; font-weight: bold;
}

.rounds-selector { display: flex; align-items: center; gap: 16px; margin-bottom: 16px; }
.rounds-selector label { font-size: 14px; color: #aaa; }
.rounds-btn {
  width: 36px; height: 36px; border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.2);
  background: transparent; color: white;
  font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center;
}
.rounds-count { font-size: 24px; font-weight: bold; min-width: 32px; }

/* ── COUNTDOWN ── */
#screen-countdown { background: #0f3460; }
#countdown-num {
  font-size: 160px; font-weight: 900;
  animation: pulse 1s ease-in-out infinite;
  color: #e94560;
}
@keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.1); } }

/* ── WAIT SCREEN ── */
#screen-wait { background: #16213e; }
#screen-wait h2 { font-size: 32px; color: #aaa; margin-bottom: 16px; }
.wait-dots { font-size: 48px; letter-spacing: 8px; }

/* ── FLASH SCREEN ── */
#screen-flash { background: #f1c40f; cursor: pointer; }
#screen-flash h1 { font-size: 56px; color: #1a1a2e; font-weight: 900; }
#screen-flash p  { font-size: 22px; color: rgba(0,0,0,0.5); margin-top: 8px; }
#screen-flash.tapped { background: #27ae60; }
#screen-flash.early  { background: #e94560; }

/* ── ROUND RESULT ── */
#screen-result { }
.result-winner {
  font-size: 80px; margin-bottom: 8px;
}
#result-name { font-size: 36px; font-weight: bold; color: #f1c40f; margin-bottom: 4px; }
#result-time { font-size: 20px; color: #aaa; margin-bottom: 24px; }
.score-list {
  width: 100%; max-width: 320px;
  background: rgba(255,255,255,0.05);
  border-radius: 14px; padding: 8px;
  margin-bottom: 20px;
}
.score-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 14px;
}
.score-row + .score-row { border-top: 1px solid rgba(255,255,255,0.05); }
.score-row .sname { font-size: 16px; }
.score-row .sval { font-size: 20px; font-weight: bold; color: #f1c40f; }

/* ── GAME OVER ── */
#screen-gameover { background: #0f3460; }
.podium { display: flex; align-items: flex-end; gap: 10px; margin: 20px 0; }
.podium-item {
  display: flex; flex-direction: column; align-items: center; gap: 6px;
}
.podium-bar {
  width: 80px; border-radius: 8px 8px 0 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 28px;
}
.podium-bar.p1 { height: 110px; background: #f1c40f; }
.podium-bar.p2 { height: 80px; background: #bdc3c7; }
.podium-bar.p3 { height: 60px; background: #cd6133; }
.podium-name { font-size: 14px; font-weight: bold; }
.podium-score { font-size: 13px; color: #aaa; }

#error-msg {
  color: #e94560; font-size: 14px; text-align: center;
  min-height: 20px; margin-top: 8px; max-width: 300px;
}

  #home-btn {
    position: fixed; top: 10px; left: 10px;
    background: rgba(0,0,0,0.5);
    border: 1px solid rgba(255,255,255,0.2);
    color: white; font-size: 13px; font-weight: bold;
    border-radius: 20px; padding: 7px 14px;
    cursor: pointer; z-index: 999;
    text-decoration: none; backdrop-filter: blur(4px);
  }
</style>
</head>
<body>
<a id="home-btn" href="index.html">🏠 홈</a>

<!-- 1. 입장 화면 -->
<div id="screen-join" class="screen active">
  <h1>⚡</h1>
  <h2 style="font-size:28px;margin-bottom:4px">반응속도 배틀</h2>
  <p>가족 4인 실시간 대결!</p>

  <div class="input-group">
    <label>닉네임</label>
    <input type="text" id="inp-name" placeholder="내 이름 입력" maxlength="8" style="text-transform:none;letter-spacing:normal">
  </div>

  <button class="btn btn-primary" onclick="createRoom()">🏠 방 만들기</button>

  <div class="divider">또는</div>

  <div class="input-group">
    <label>방 코드</label>
    <input type="text" id="inp-code" placeholder="XXXX" maxlength="4">
  </div>
  <button class="btn btn-secondary" onclick="joinRoom()">🚪 방 입장하기</button>

  <div id="error-msg"></div>
</div>

<!-- 2. 대기 로비 -->
<div id="screen-lobby" class="screen">
  <h2>대기 중...</h2>
  <div class="room-code-display" id="lobby-code">----</div>
  <div class="room-code-hint">친구들에게 이 코드를 알려주세요!</div>

  <div class="player-list" id="player-list"></div>

  <div class="rounds-selector" id="rounds-selector" style="display:none">
    <label>라운드 수</label>
    <button class="rounds-btn" onclick="changeRounds(-1)">−</button>
    <span class="rounds-count" id="rounds-count">5</span>
    <button class="rounds-btn" onclick="changeRounds(1)">+</button>
  </div>

  <button class="btn btn-green" id="btn-start" style="display:none" onclick="startGame()">▶ 게임 시작!</button>
  <p id="lobby-hint" style="color:#666;font-size:14px">호스트가 게임을 시작할 때까지 기다려주세요...</p>
</div>

<!-- 3. 카운트다운 -->
<div id="screen-countdown" class="screen">
  <div id="countdown-num">3</div>
</div>

<!-- 4. 대기 (신호 전) -->
<div id="screen-wait" class="screen">
  <h2>⏳ 기다려...</h2>
  <div class="wait-dots">· · ·</div>
</div>

<!-- 5. 신호! 눌러!! -->
<div id="screen-flash" class="screen" ontouchstart="onTap()" onclick="onTap()">
  <h1>⚡ 눌러!</h1>
  <p id="flash-sub">화면을 탭하세요!</p>
</div>

<!-- 6. 라운드 결과 -->
<div id="screen-result" class="screen">
  <div class="result-winner" id="result-emoji">🏆</div>
  <div id="result-name">---</div>
  <div id="result-time">0ms</div>
  <div class="score-list" id="score-list"></div>
  <p style="color:#555;font-size:14px" id="result-hint">다음 라운드 준비 중...</p>
</div>

<!-- 7. 게임 오버 -->
<div id="screen-gameover" class="screen">
  <h2 style="font-size:32px;margin-bottom:4px">🎉 게임 종료!</h2>
  <p style="color:#aaa;margin-bottom:12px" id="go-subtitle">최종 결과</p>
  <div class="podium" id="podium"></div>
  <div class="score-list" id="final-scores" style="max-width:320px;width:100%"></div>
  <button class="btn btn-gold" style="margin-top:16px" onclick="backToLobby()">🔄 다시 하기</button>
</div>

<script>
// ════════════════════════════════════════════════
//  ⚠️  여기에 Firebase 설정 붙여넣기
// ════════════════════════════════════════════════
const firebaseConfig = {
  apiKey: "AIzaSyBHGy2BLlczHTFaCfvEifYoiXq7lvpC71Q",
  authDomain: "game-3ce55.firebaseapp.com",
  databaseURL: "https://game-3ce55-default-rtdb.firebaseio.com",
  projectId: "game-3ce55",
  storageBucket: "game-3ce55.firebasestorage.app",
  messagingSenderId: "120980443940",
  appId: "1:120980443940:web:aaa5035c959ff12676d9b1",
  measurementId: "G-JQB4DYKERF"
};
// ════════════════════════════════════════════════

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// 상태
let myId = 'p_' + Math.random().toString(36).slice(2, 9);
let myName = '';
let roomCode = '';
let isHost = false;
let totalRounds = 5;
let currentRound = 0;
let hasTapped = false;
let flashStartTime = 0;
let roomRef = null;
let stateListener = null;

const AVATARS = ['🐶','🐱','🐰','🦊','🐻','🐼','🐯','🦁'];
function myAvatar() {
  return AVATARS[Math.abs(myId.charCodeAt(2) - 97) % AVATARS.length];
}

// ── 화면 전환 ──────────────────────────────────
function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
}
function setError(msg) {
  document.getElementById('error-msg').textContent = msg;
}

// ── 방 만들기 ──────────────────────────────────
async function createRoom() {
  myName = document.getElementById('inp-name').value.trim();
  if (!myName) { setError('닉네임을 입력해주세요'); return; }

  setError('🔄 방 만드는 중...');
  try {
    const code = Math.random().toString(36).slice(2, 6).toUpperCase();
    roomCode = code;
    isHost = true;
    roomRef = db.ref('rooms/' + code);

    await roomRef.set({
      host: myId,
      state: 'lobby',
      round: 0,
      totalRounds: 5,
      flashTime: 0,
    });
    await roomRef.child('players/' + myId).set({
      name: myName,
      avatar: myAvatar(),
      score: 0,
    });

    roomRef.onDisconnect().remove();
    enterLobby();
  } catch(e) {
    setError('❌ Firebase 연결 실패: ' + e.message);
    console.error(e);
  }
}

// ── 방 입장 ────────────────────────────────────
async function joinRoom() {
  myName = document.getElementById('inp-name').value.trim();
  const code = document.getElementById('inp-code').value.trim().toUpperCase();
  if (!myName) { setError('닉네임을 입력해주세요'); return; }
  if (code.length !== 4) { setError('방 코드 4자리를 입력해주세요'); return; }

  setError('🔄 연결 중...');
  let snap;
  try {
    snap = await db.ref('rooms/' + code).once('value');
  } catch(e) {
    setError('❌ Firebase 연결 실패: ' + e.message); return;
  }
  if (!snap.exists()) { setError('방을 찾을 수 없어요'); return; }

  const room = snap.val();
  const playerCount = Object.keys(room.players || {}).length;
  if (playerCount >= 6) { setError('방이 꽉 찼어요 (최대 6명)'); return; }
  if (room.state !== 'lobby') { setError('이미 게임이 시작됐어요'); return; }

  roomCode = code;
  isHost = false;
  roomRef = db.ref('rooms/' + code);

  await roomRef.child('players/' + myId).set({
    name: myName,
    avatar: myAvatar(),
    score: 0,
  });

  roomRef.child('players/' + myId).onDisconnect().remove();
  enterLobby();
}

// ── 로비 진입 ──────────────────────────────────
function enterLobby() {
  setError('');
  show('lobby');
  document.getElementById('lobby-code').textContent = roomCode;

  if (isHost) {
    document.getElementById('rounds-selector').style.display = 'flex';
    document.getElementById('btn-start').style.display = 'block';
    document.getElementById('lobby-hint').style.display = 'none';
  }

  // 플레이어 목록 실시간
  roomRef.child('players').on('value', snap => {
    const players = snap.val() || {};
    renderPlayerList(players);
  });

  // 게임 상태 감시
  listenState();
}

function renderPlayerList(players) {
  const el = document.getElementById('player-list');
  el.innerHTML = '';
  Object.entries(players).forEach(([id, p]) => {
    const div = document.createElement('div');
    div.className = 'player-item';
    div.innerHTML = `
      <span class="avatar">${p.avatar}</span>
      <span class="pname">${p.name}</span>
      ${id === (roomRef ? null : '') ? '' : ''}
      ${isHost && id === myId ? '<span class="host-badge">HOST</span>' : ''}
    `;
    el.appendChild(div);
  });
}

function changeRounds(delta) {
  totalRounds = Math.max(3, Math.min(10, totalRounds + delta));
  document.getElementById('rounds-count').textContent = totalRounds;
  roomRef.update({ totalRounds });
}

// ── 게임 시작 (호스트) ──────────────────────────
async function startGame() {
  const snap = await roomRef.child('players').once('value');
  if (Object.keys(snap.val() || {}).length < 2) {
    alert('최소 2명이 필요해요!'); return;
  }
  // 점수 초기화
  const players = snap.val();
  const updates = {};
  Object.keys(players).forEach(id => { updates[`players/${id}/score`] = 0; });
  updates.round = 0;
  updates.totalRounds = totalRounds;
  updates.state = 'countdown';
  updates.countdown = 3;
  await roomRef.update(updates);
}

// ── 상태 리스너 ────────────────────────────────
function listenState() {
  if (stateListener) roomRef.off('value', stateListener);
  stateListener = roomRef.on('value', snap => {
    const room = snap.val();
    if (!room) return;
    handleState(room);
  });
}

let countdownTimer = null;
let waitTimer = null;

function handleState(room) {
  switch (room.state) {
    case 'lobby':
      show('lobby'); break;

    case 'countdown':
      show('countdown');
      document.getElementById('countdown-num').textContent = room.countdown;
      if (isHost && room.countdown > 0) {
        clearTimeout(countdownTimer);
        countdownTimer = setTimeout(() => {
          if (room.countdown > 1) {
            roomRef.update({ countdown: room.countdown - 1 });
          } else {
            roomRef.update({ state: 'waiting', countdown: 0 });
          }
        }, 1000);
      }
      break;

    case 'waiting':
      show('wait');
      hasTapped = false;
      document.getElementById('screen-flash').className = 'screen';
      if (isHost) {
        // 랜덤 딜레이 후 신호
        clearTimeout(waitTimer);
        const delay = 1500 + Math.random() * 3500;
        waitTimer = setTimeout(async () => {
          const now = Date.now();
          // 이전 탭 초기화
          await roomRef.child('taps').remove();
          await roomRef.update({ state: 'flash', flashTime: now });
        }, delay);
      }
      break;

    case 'flash':
      flashStartTime = room.flashTime;
      show('flash');
      if (isHost) {
        // 5초 내 아무도 안 누르면 다시
        clearTimeout(waitTimer);
        waitTimer = setTimeout(() => {
          roomRef.update({ state: 'waiting' });
        }, 5000);
      }
      break;

    case 'roundResult':
      clearTimeout(waitTimer);
      showRoundResult(room);
      if (isHost) {
        setTimeout(() => {
          currentRound = room.round;
          if (currentRound >= room.totalRounds) {
            roomRef.update({ state: 'gameOver' });
          } else {
            roomRef.update({ state: 'countdown', countdown: 3 });
          }
        }, 3500);
      }
      break;

    case 'gameOver':
      showGameOver(room);
      break;
  }
}

// ── 탭 처리 ────────────────────────────────────
async function onTap() {
  const screen = document.getElementById('screen-flash');
  if (!screen.classList.contains('active')) return;

  const now = Date.now();

  // 아직 flash 상태가 아니면 얼리
  const snap = await roomRef.child('state').once('value');
  if (snap.val() !== 'flash') {
    screen.classList.add('early');
    document.getElementById('flash-sub').textContent = '❌ 너무 빨라요!';
    hasTapped = true;
    return;
  }

  if (hasTapped) return;
  hasTapped = true;

  const reactionMs = now - flashStartTime;
  screen.classList.add('tapped');
  document.getElementById('flash-sub').textContent = `${reactionMs}ms ✅`;

  await roomRef.child('taps/' + myId).set(reactionMs);

  // 호스트가 모든 탭 확인 후 결과 처리
  if (isHost) {
    checkAllTapped();
  }
}

async function checkAllTapped() {
  // 1초 후 결과 집계 (모두 탭 기회 주기)
  setTimeout(async () => {
    const [tapsSnap, playersSnap, roomSnap] = await Promise.all([
      roomRef.child('taps').once('value'),
      roomRef.child('players').once('value'),
      roomRef.once('value'),
    ]);

    const room = roomSnap.val();
    if (room.state !== 'flash') return;

    const taps = tapsSnap.val() || {};
    const players = playersSnap.val() || {};

    // 가장 빠른 탭
    let winnerId = null, winTime = Infinity;
    Object.entries(taps).forEach(([id, ms]) => {
      if (ms > 0 && ms < winTime) { winTime = ms; winnerId = id; }
    });

    const updates = {};
    if (winnerId) {
      updates[`players/${winnerId}/score`] = (players[winnerId]?.score || 0) + 1;
      updates.roundWinner = winnerId;
      updates.roundWinTime = winTime;
    } else {
      updates.roundWinner = null;
      updates.roundWinTime = 0;
    }
    updates.round = (room.round || 0) + 1;
    updates.state = 'roundResult';

    await roomRef.update(updates);
  }, 1200);
}

// ── 라운드 결과 표시 ───────────────────────────
async function showRoundResult(room) {
  show('result');
  const snap = await roomRef.child('players').once('value');
  const players = snap.val() || {};

  const winnerId = room.roundWinner;
  if (winnerId && players[winnerId]) {
    document.getElementById('result-emoji').textContent = '🏆';
    document.getElementById('result-name').textContent = players[winnerId].name + ' 승리!';
    document.getElementById('result-time').textContent = room.roundWinTime + 'ms';
  } else {
    document.getElementById('result-emoji').textContent = '😅';
    document.getElementById('result-name').textContent = '아무도 못 눌렀어요';
    document.getElementById('result-time').textContent = '';
  }

  document.getElementById('result-hint').textContent =
    room.round >= room.totalRounds ? '게임 종료 중...' : `${room.round} / ${room.totalRounds} 라운드`;

  // 점수판
  const sorted = Object.entries(players).sort((a,b) => b[1].score - a[1].score);
  const medals = ['🥇','🥈','🥉'];
  document.getElementById('score-list').innerHTML = sorted.map(([id, p], i) => `
    <div class="score-row">
      <span class="sname">${medals[i] || '  '} ${p.avatar} ${p.name}${id === myId ? ' (나)' : ''}</span>
      <span class="sval">${p.score}점</span>
    </div>
  `).join('');
}

// ── 게임 오버 ──────────────────────────────────
async function showGameOver(room) {
  show('gameover');
  const snap = await roomRef.child('players').once('value');
  const players = snap.val() || {};
  const sorted = Object.entries(players).sort((a,b) => b[1].score - a[1].score);

  const medals = ['🥇','🥈','🥉'];
  const barClasses = ['p1','p2','p3'];

  // 포디엄 (1~3위)
  const top3 = sorted.slice(0, 3);
  // 시각적으로 2-1-3 배치
  const order = top3.length >= 2 ? [top3[1], top3[0], top3[2]].filter(Boolean) : top3;
  const barClass = top3.length >= 2 ? ['p2','p1','p3'] : ['p1'];
  document.getElementById('podium').innerHTML = order.map((entry, i) => {
    const [, p] = entry;
    return `<div class="podium-item">
      <div class="podium-name">${p.name}</div>
      <div class="podium-bar ${barClass[i]}">${p.avatar}</div>
      <div class="podium-score">${p.score}점</div>
    </div>`;
  }).join('');

  // 전체 점수
  document.getElementById('final-scores').innerHTML = sorted.map(([id, p], i) => `
    <div class="score-row">
      <span class="sname">${medals[i] || `${i+1}.`} ${p.avatar} ${p.name}${id === myId ? ' (나)' : ''}</span>
      <span class="sval">${p.score}점</span>
    </div>
  `).join('');
}

// ── 다시 하기 ──────────────────────────────────
async function backToLobby() {
  if (isHost) {
    const snap = await roomRef.child('players').once('value');
    const players = snap.val() || {};
    const updates = { state: 'lobby', round: 0, roundWinner: null };
    Object.keys(players).forEach(id => { updates[`players/${id}/score`] = 0; });
    await roomRef.update(updates);
  }
  show('lobby');
}

// 엔터키 지원
document.getElementById('inp-code').addEventListener('keydown', e => {
  if (e.key === 'Enter') joinRoom();
});
document.getElementById('inp-name').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('inp-code').focus();
});
