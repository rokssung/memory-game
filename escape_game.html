<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🔐 방탈출</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body {
  width:100%; min-height:100%;
  background:#0d0d1a;
  font-family:'Arial',sans-serif;
  color:#fff;
  user-select:none;
  -webkit-tap-highlight-color:transparent;
}

/* ── 공통 오버레이 ── */
.screen {
  display:none; position:fixed; inset:0;
  flex-direction:column; align-items:center; justify-content:center;
  padding:24px; text-align:center; z-index:10;
}
.screen.active { display:flex; }

/* ── 타이틀 화면 ── */
#title-screen { background:#0d0d1a; }
#title-screen h1 { font-size:60px; margin-bottom:6px; }
#title-screen h2 { font-size:26px; color:#a78bfa; margin-bottom:8px; }
#title-screen p  { color:#555; font-size:14px; line-height:1.7; max-width:300px; margin-bottom:28px; }
.btn-primary {
  padding:14px 48px; border:none; border-radius:24px;
  background:linear-gradient(135deg,#6366f1,#a855f7);
  color:#fff; font-size:18px; font-weight:bold; cursor:pointer;
  box-shadow:0 0 30px rgba(139,92,246,.4);
}
.btn-secondary {
  margin-top:10px; color:#444; font-size:13px;
  background:none; border:none; cursor:pointer; text-decoration:underline;
}

/* 난이도 선택 */
.grade-picker {
  display:flex; gap:12px; margin-bottom:10px;
}
.grade-btn {
  flex:1; max-width:150px;
  padding:14px 10px;
  border:2px solid rgba(255,255,255,.1);
  border-radius:18px;
  background:rgba(255,255,255,.04);
  color:#fff; cursor:pointer; text-align:center;
  transition:border-color .15s, background .15s;
}
.grade-btn:active { transform:scale(.96); }
.grade-btn .g-icon { font-size:34px; margin-bottom:6px; }
.grade-btn .g-name { font-size:14px; font-weight:bold; }
.grade-btn .g-desc { font-size:11px; color:#888; margin-top:4px; line-height:1.5; }
.grade-btn.easy { border-color:rgba(74,222,128,.3); }
.grade-btn.easy:active { background:rgba(74,222,128,.1); }
.grade-btn.hard { border-color:rgba(167,139,250,.3); }
.grade-btn.hard:active { background:rgba(167,139,250,.1); }

/* ── 클리어/게임오버 화면 ── */
#clear-screen { background:rgba(0,0,0,.92); }
#over-screen  { background:rgba(0,0,0,.92); }
#clear-screen h1 { font-size:52px; }
#over-screen h1  { font-size:52px; }
.result-title { font-size:26px; font-weight:bold; margin:10px 0 4px; }
.result-time  { color:#a78bfa; font-size:20px; }
.result-best  { color:#444; font-size:13px; margin-bottom:24px; }

/* ── 게임 화면 ── */
#game-screen {
  display:none; position:fixed; inset:0;
  background:#0d0d1a; overflow-y:auto;
  flex-direction:column;
}
#game-screen.active { display:flex; }

/* HUD */
#hud {
  position:sticky; top:0; z-index:5;
  display:flex; justify-content:space-between; align-items:center;
  padding:12px 20px;
  background:rgba(13,13,26,.95);
  border-bottom:1px solid rgba(255,255,255,.06);
}
#stage-info { font-size:13px; color:#888; letter-spacing:1px; }
#stage-name { font-size:17px; font-weight:bold; color:#c4b5fd; }
#timer-display { font-size:22px; font-weight:bold; color:#f1c40f; font-variant-numeric:tabular-nums; }
#hint-btn {
  padding:6px 14px; border:none; border-radius:14px;
  background:rgba(241,196,15,.12); border:1px solid rgba(241,196,15,.3);
  color:#f1c40f; font-size:12px; cursor:pointer;
}

/* 방 */
#room-view {
  flex:1; display:flex; flex-direction:column;
  align-items:center; padding:16px 16px 32px;
  gap:14px; max-width:480px; margin:0 auto; width:100%;
}

/* 방 그림 */
.room-art {
  width:100%; max-width:360px;
  background:rgba(255,255,255,.03);
  border:1px solid rgba(255,255,255,.08);
  border-radius:20px;
  padding:20px;
  font-size:80px; text-align:center;
  line-height:1.2;
  min-height:140px;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  gap:8px;
}
.room-art .room-sub { font-size:13px; color:#555; margin-top:4px; }

/* 방 복도 지도 + 캐릭터 */
#hall-map {
  position: relative;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  width: 100%; max-width: 360px;
  height: 86px;
  margin: 0 auto;
  padding: 10px 18px 16px;
  background: linear-gradient(180deg, rgba(167,139,250,0.08), transparent);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 16px;
}
.hall-door {
  display: flex; flex-direction: column; align-items: center;
  font-size: 24px; opacity: 0.35;
  transition: opacity .3s, transform .3s;
}
.hall-door .door-num { font-size: 10px; color: #777; margin-top: 2px; white-space:nowrap; }
.hall-door.cleared { opacity: 0.55; }
.hall-door.cleared .door-num::after { content: ' ✅'; }
.hall-door.active { opacity: 1; transform: translateY(-4px) scale(1.18); }
.hall-door.active .door-icon { animation: doorGlow 1.1s ease-in-out infinite alternate; }
@keyframes doorGlow {
  from { filter: drop-shadow(0 0 0px #a78bfa); }
  to   { filter: drop-shadow(0 0 7px #a78bfa); }
}
#hall-character {
  position: absolute;
  bottom: 16px; left: 0;
  font-size: 26px;
  transform: translateX(-50%);
  transition: left .9s cubic-bezier(.4,0,.2,1);
  z-index: 3;
}
#hall-character.bounce { animation: charBounce .5s ease; }
@keyframes charBounce {
  0%   { transform: translateX(-50%) scale(1); }
  40%  { transform: translateX(-50%) scale(0.7, 1.18); }
  70%  { transform: translateX(-50%) scale(1.12, 0.9); }
  100% { transform: translateX(-50%) scale(1); }
}

/* 단서 카드 */
.clue-card {
  width:100%; max-width:360px;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);
  border-radius:16px;
  padding:16px 18px;
}
.clue-card h3 { font-size:13px; color:#888; letter-spacing:1px; margin-bottom:8px; }
.clue-text { font-size:15px; color:#ddd; line-height:1.6; }
.clue-highlight { color:#fbbf24; font-weight:bold; }

/* 퍼즐 영역 */
.puzzle-area {
  width:100%; max-width:360px;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);
  border-radius:16px;
  padding:20px 18px;
}
.puzzle-area h3 { font-size:13px; color:#888; letter-spacing:1px; margin-bottom:14px; }

/* 숫자 자물쇠 */
.digit-lock {
  display:flex; gap:10px; justify-content:center; margin-bottom:14px;
}
.digit-slot {
  width:52px; height:64px;
  background:rgba(0,0,0,.4);
  border:2px solid rgba(255,255,255,.12);
  border-radius:12px;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  gap:4px;
}
.digit-slot .digit-val {
  font-size:26px; font-weight:bold; color:#fff;
  min-width:24px; text-align:center;
}
.digit-slot button {
  background:rgba(255,255,255,.08);
  border:none; color:#fff; width:36px; height:20px;
  border-radius:6px; font-size:14px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
}
.digit-slot button:active { background:rgba(255,255,255,.2); }

/* 선택지 버튼 */
.choice-grid {
  display:grid; grid-template-columns:1fr 1fr;
  gap:10px;
}
.choice-btn {
  padding:14px 10px; border:2px solid rgba(255,255,255,.1);
  border-radius:14px; background:rgba(255,255,255,.04);
  color:#ddd; font-size:15px; cursor:pointer; text-align:center;
  transition:border-color .15s, background .15s;
}
.choice-btn:active { background:rgba(255,255,255,.12); }
.choice-btn.selected { border-color:#a78bfa; background:rgba(167,139,250,.12); color:#c4b5fd; }
.choice-btn.wrong    { border-color:#f43f5e; background:rgba(244,63,94,.08); animation:shake .3s; }
.choice-btn.correct  { border-color:#22c55e; background:rgba(34,197,94,.12); }

/* 순서 맞추기 */
.order-list { display:flex; flex-direction:column; gap:8px; }
.order-item {
  display:flex; align-items:center; gap:12px;
  padding:12px 14px;
  background:rgba(255,255,255,.05);
  border:2px solid rgba(255,255,255,.1);
  border-radius:12px; cursor:pointer;
  transition:border-color .15s;
}
.order-item.selected { border-color:#a78bfa; }
.order-item .order-rank {
  width:28px; height:28px; border-radius:8px;
  background:rgba(167,139,250,.2);
  display:flex; align-items:center; justify-content:center;
  font-size:14px; font-weight:bold; color:#a78bfa;
}
.order-item .order-label { font-size:15px; color:#ddd; }

/* 제출 버튼 */
.submit-btn {
  width:100%; padding:14px;
  border:none; border-radius:14px;
  background:linear-gradient(135deg,#6366f1,#a855f7);
  color:#fff; font-size:16px; font-weight:bold;
  cursor:pointer; margin-top:12px;
  transition:opacity .15s;
}
.submit-btn:disabled { opacity:.4; cursor:default; }
.submit-btn:active:not(:disabled) { opacity:.85; }
.skip-btn {
  background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.15);
}
.text-answer-input {
  width:100%; padding:14px 16px; margin-top:6px;
  border-radius:14px; border:1px solid rgba(255,255,255,0.15);
  background:rgba(255,255,255,0.06); color:#fff;
  font-size:16px; text-align:center; outline:none;
}
.text-answer-input:focus { border-color:#a78bfa; }
.text-answer-input::placeholder { color:#666; }

/* 피드백 */
.feedback {
  text-align:center; font-size:14px;
  min-height:20px; margin-top:8px;
}
.feedback.ok  { color:#22c55e; }
.feedback.err { color:#f43f5e; }

/* 힌트 모달 */
#hint-modal {
  display:none; position:fixed; inset:0;
  background:rgba(0,0,0,.7);
  align-items:flex-end; justify-content:center;
  z-index:30;
}
#hint-modal.on { display:flex; }
.hint-box {
  background:#1a1a2e;
  border-radius:24px 24px 0 0;
  padding:24px 24px 40px;
  max-width:480px; width:100%;
}
.hint-box h3 { font-size:16px; color:#f1c40f; margin-bottom:12px; }
.hint-box p  { color:#aaa; font-size:14px; line-height:1.7; }
.hint-close {
  margin-top:16px; width:100%; padding:12px;
  border:none; border-radius:14px;
  background:rgba(255,255,255,.08); color:#fff;
  font-size:15px; cursor:pointer;
}

/* 유이환 전용 힌트 */
.kid-hint-toggle {
  width:100%; margin-top:12px; padding:10px;
  border:2px dashed rgba(251,191,36,.35);
  border-radius:14px; background:rgba(251,191,36,.06);
  color:#fbbf24; font-size:13px; font-weight:bold;
  cursor:pointer; text-align:left;
  display:flex; align-items:center; justify-content:space-between;
}
.kid-hint-body {
  display:none; margin-top:8px;
  background:rgba(251,191,36,.08);
  border-radius:12px; padding:12px 14px;
}
.kid-hint-body.open { display:block; }
.kid-hint-body p { color:#fde68a; font-size:14px; line-height:1.8; }

/* 해설 카드 */
.explanation-card {
  width:100%; max-width:360px;
  background:rgba(34,197,94,.08);
  border:2px solid rgba(34,197,94,.3);
  border-radius:16px;
  padding:18px 18px 14px;
  animation:fadeIn .4s ease;
}
.explanation-card h3 { font-size:13px; color:#86efac; letter-spacing:1px; margin-bottom:8px; }
.explanation-card p  { font-size:15px; color:#d1fae5; line-height:1.7; }
.next-stage-btn {
  width:100%; margin-top:12px; padding:14px;
  border:none; border-radius:14px;
  background:linear-gradient(135deg,#22c55e,#16a34a);
  color:#fff; font-size:16px; font-weight:bold;
  cursor:pointer;
}
@keyframes fadeIn {
  from { opacity:0; transform:translateY(8px); }
  to   { opacity:1; transform:translateY(0); }
}

@keyframes shake {
  0%,100%{ transform:translateX(0); }
  25%    { transform:translateX(-6px); }
  75%    { transform:translateX(6px); }
}

#home-btn {
  position: fixed; top: 10px; left: 10px;
  background: rgba(0,0,0,0.5);
  border: 1px solid rgba(255,255,255,0.2);
  color: white; font-size: 13px; font-weight: bold;
  border-radius: 20px; padding: 7px 14px;
  cursor: pointer; z-index: 999;
  text-decoration: none; backdrop-filter: blur(4px);
}
</style>
</head>
<body>

<a id="home-btn" href="#" onclick="event.preventDefault();showQuitConfirm()">🏠 홈</a>

<div id="quit-confirm" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);align-items:center;justify-content:center;z-index:999;">
  <div style="background:#16213e;border:2px solid #e94560;border-radius:20px;padding:28px 24px;text-align:center;width:88%;max-width:300px;">
    <div style="font-size:32px;margin-bottom:8px">🚪</div>
    <h3 style="font-size:20px;margin-bottom:8px">게임을 나가시겠어요?</h3>
    <p style="font-size:14px;color:#aaa;margin-bottom:20px">현재 진행상황은 저장되지 않아요</p>
    <div style="display:flex;gap:10px">
      <button onclick="closeQuitConfirm()" style="flex:1;padding:12px;border:none;border-radius:12px;font-size:15px;font-weight:bold;background:rgba(255,255,255,0.1);color:white;cursor:pointer">계속 하기</button>
      <button onclick="location.href='index.html'" style="flex:1;padding:12px;border:none;border-radius:12px;font-size:15px;font-weight:bold;background:#e94560;color:white;cursor:pointer">나가기</button>
    </div>
  </div>
</div>

<!-- 타이틀 화면 -->
<div id="title-screen" class="screen active">
  <h1>🔐</h1>
  <h2>방탈출</h2>
  <p>5개의 방에 숨겨진 단서를 찾고<br>퍼즐을 풀어 탈출하세요!<br>난이도를 선택하세요.</p>
  <div class="grade-picker">
    <button class="grade-btn easy" onclick="selectGrade('easy')">
      <div class="g-icon">🧒</div>
      <div class="g-name">초등 1학년</div>
      <div class="g-desc">그림·세기·순서<br>쉬운 퍼즐</div>
    </button>
    <button class="grade-btn hard" onclick="selectGrade('hard')">
      <div class="g-icon">🎓</div>
      <div class="g-name">초등 5학년</div>
      <div class="g-desc">논리·수학·암호<br>도전 퍼즐</div>
    </button>
  </div>
  <button class="btn-secondary" onclick="location.href='index.html'">← 게임 허브</button>
</div>

<!-- 게임 화면 -->
<div id="game-screen">
  <div id="hud">
    <div>
      <div id="stage-info">STAGE</div>
      <div id="stage-name">--</div>
    </div>
    <div id="timer-display">00:00</div>
    <button id="hint-btn">💡 힌트</button>
  </div>
  <div id="room-view"></div>
</div>

<!-- 힌트 모달 -->
<div id="hint-modal">
  <div class="hint-box">
    <h3>💡 힌트</h3>
    <p id="hint-text"></p>
    <button class="kid-hint-toggle" id="kid-hint-toggle">
      <span>🧒 유이환 전용 힌트</span>
      <span id="kid-hint-arrow">▾</span>
    </button>
    <div class="kid-hint-body" id="kid-hint-body">
      <p id="kid-hint-text"></p>
    </div>
    <button class="hint-close" id="hint-close">닫기</button>
  </div>
</div>

<!-- 클리어 화면 -->
<div id="clear-screen" class="screen">
  <h1>🎉</h1>
  <div class="result-title">탈출 성공!</div>
  <div class="result-time" id="clear-time"></div>
  <div class="result-best" id="clear-best"></div>
  <button class="btn-primary" id="retry-btn" style="margin-top:8px">다시하기</button>
  <button class="btn-secondary" onclick="location.href='index.html'">← 게임 허브</button>
</div>

<!-- 게임오버 화면 -->
<div id="over-screen" class="screen">
  <h1>😅</h1>
  <div class="result-title">시간 초과!</div>
  <div class="result-time">제한 시간을 초과했어요</div>
  <div class="result-best" id="over-best"></div>
  <button class="btn-primary" id="retry-btn2" style="margin-top:24px">다시하기</button>
  <button class="btn-secondary" onclick="location.href='index.html'">← 게임 허브</button>
</div>

<script>
function showQuitConfirm() { document.getElementById('quit-confirm').style.display = 'flex'; }
function closeQuitConfirm() { document.getElementById('quit-confirm').style.display = 'none'; }

// ────────────────────────────────────────────────
// PUZZLE POOLS
// ────────────────────────────────────────────────

// ── 초등 1학년 문제 풀 (7개 중 5개 랜덤)
const EASY_POOL = [

  // ── 국어 및 어휘 ──────────────────────────────────────
  {
    name: '🔤 한글 카드방',
    art: '🔤📚✨', artSub: '한글 카드가 줄지어 놓여있다',
    clue: '카드 문제:\n"<span class="clue-highlight">\'가나다라\' 다음에 올 알맞은 글자는?\n① 마  ② 바  ③ 사  ④ 아</span>"',
    hint: '"마바사아자차카타파하" 노래를 떠올려 보세요.',
    kidHint: '"가나다라" 다음에 부르는 노래 가사를 천천히 떠올려보면 답이 나와요!',
    type: 'choice', question: '\'가나다라\' 다음 글자는?',
    choices: ['마', '바', '사', '아'], answer: 0,
    explanation: '정답은 ①번 "마"! "가나다라마바사아자차카타파하" 순서를 기억해요. 🔤',
  },
  {
    name: '❄️ 겨울 풍경방',
    art: '❄️☃️🌨️', artSub: '하얀 눈이 그려진 그림이 걸려있다',
    clue: '그림 속 질문:\n"<span class="clue-highlight">하늘에서 내리는 하얗고 차가운 것은?\n① 비  ② 눈  ③ 바람  ④ 구름</span>"',
    hint: '겨울에 내리고, 뭉쳐서 사람 모양을 만들 수 있어요.',
    kidHint: '눈사람을 만들 수 있는 하얀 것이 하늘에서 내려요!',
    type: 'choice', question: '하늘에서 내리는 하얗고 차가운 것은?',
    choices: ['비', '눈', '바람', '구름'], answer: 1,
    explanation: '정답은 ②번 "눈"! 겨울에 내리는 하얗고 차가운 결정이에요. ❄️',
  },
  {
    name: '✏️ 글자 퍼즐방',
    art: '🔤✏️🍎', artSub: '낱말 카드가 흩어져 있다',
    clue: '카드 속 문제:\n"<span class="clue-highlight">\'사과\'의 첫 번째 글자 \'사\'는 어떤 자음으로 시작할까?\n① ㄱ  ② ㄴ  ③ ㅅ  ④ ㅂ</span>"',
    hint: '뱀이 지나가는 소리 "스으으"와 비슷한 자음이에요.',
    kidHint: '"사과"라고 천천히 발음해보면 첫 소리가 무엇과 닮았나요?',
    type: 'choice', question: '\'사과\'의 첫 자음은?',
    choices: ['ㄱ', 'ㄴ', 'ㅅ', 'ㅂ'], answer: 2,
    explanation: '정답은 ③번 "ㅅ"! "사과"는 자음 ㅅ으로 시작해요. ✏️',
  },
  {

function pickStages(grade) {
  const pool = grade === 'hard' ? HARD_POOL : EASY_POOL;
  const shuffled = [...pool].sort(() => Math.random() - 0.5);
  return shuffled.slice(0, 5).map((st, i) => ({ ...st, id: i + 1 }));
}

const TIME_LIMIT = 600; // 10분

// ── 상태
let currentStages = [];
let currentStage = 0;
let elapsed = 0;
let timerID = null;
let gameActive = false;
let selectedGrade = 'easy';

function selectGrade(grade) {
  selectedGrade = grade;
  startGame();
}

const best = (() => { try { return parseInt(localStorage.getItem('escape_best') || '0'); } catch(e) { return 0; } })();

// ── 화면 전환
function showScreen(id) {
  ['title-screen','game-screen','clear-screen','over-screen'].forEach(s => {
    const el = document.getElementById(s);
    el.classList.remove('active');
  });
  document.getElementById(id).classList.add('active');
}

// ── 타이머
function startTimer() {
  elapsed = 0;
  timerID = setInterval(() => {
    elapsed++;
    updateTimerDisplay();
    if (elapsed >= TIME_LIMIT) {
      clearInterval(timerID);
      gameActive = false;
      showGameOver();
    }
  }, 1000);
}

function updateTimerDisplay() {
  const m = Math.floor(elapsed / 60).toString().padStart(2,'0');
  const s = (elapsed % 60).toString().padStart(2,'0');
  document.getElementById('timer-display').textContent = m + ':' + s;
}

function calcScore() {
  // 남은 시간이 많을수록 고득점
  return Math.max(0, TIME_LIMIT - elapsed) * 10;
}

function saveScore(sc) {
  try {
    const prev = parseInt(localStorage.getItem('escape_best') || '0');
    if (sc > prev) localStorage.setItem('escape_best', sc);
    const name = (() => { try { return localStorage.getItem('gameName') || '?'; } catch(e){ return '?'; } })();
    const key = 'escape_rank';
    const ranks = JSON.parse((() => { try { return localStorage.getItem(key) || '[]'; } catch(e){ return '[]'; } })());
    ranks.push({ name, score: sc, time: elapsed, date: new Date().toLocaleDateString('ko-KR') });
    ranks.sort((a,b) => b.score - a.score);
    try { localStorage.setItem(key, JSON.stringify(ranks.slice(0,10))); } catch(e) {}
  } catch(e) {}
}

// ── 게임 시작
function startGame() {
  currentStages = pickStages(selectedGrade);
  currentStage = 0;
  gameActive = true;
  clearInterval(timerID);
  showScreen('game-screen');
  startTimer();
  renderStage();
}

function showClear() {
  clearInterval(timerID);
  gameActive = false;
  const sc = calcScore();
  saveScore(sc);
  const m = Math.floor(elapsed / 60).toString().padStart(2,'0');
  const s = (elapsed % 60).toString().padStart(2,'0');
  const bestNow = (() => { try { return parseInt(localStorage.getItem('escape_best') || '0'); } catch(e){ return 0; } })();
  document.getElementById('clear-time').textContent = `클리어 시간: ${m}:${s}  점수: ${sc}점`;
  document.getElementById('clear-best').textContent = `최고 점수: ${bestNow}점`;
  showScreen('clear-screen');
}

function showGameOver() {
  const bestNow = (() => { try { return parseInt(localStorage.getItem('escape_best') || '0'); } catch(e){ return 0; } })();
  document.getElementById('over-best').textContent = `최고 점수: ${bestNow}점`;
  showScreen('over-screen');
}

// ────────────────────────────────────────────────
// STAGE RENDERER
// ── 복도 지도: 방 목록 + 이동하는 캐릭터
const HALL_CHARACTERS = ['🧑‍🚀', '🦸', '🧚', '🐱', '🐻', '🐼', '🦊', '🐧'];
function getHallCharacter() {
  const name = (() => { try { return localStorage.getItem('gameName') || ''; } catch(e){ return ''; } })();
  let h = 0;
  for (let i = 0; i < name.length; i++) h = (h * 31 + name.charCodeAt(i)) >>> 0;
  return HALL_CHARACTERS[h % HALL_CHARACTERS.length];
}

function renderHallMap(view) {
  const map = document.createElement('div');
  map.id = 'hall-map';

  const charEl = document.createElement('div');
  charEl.id = 'hall-character';
  charEl.textContent = getHallCharacter();
  map.appendChild(charEl);

  currentStages.forEach((st, i) => {
    const door = document.createElement('div');
    door.className = 'hall-door' + (i < currentStage ? ' cleared' : i === currentStage ? ' active' : '');
    door.innerHTML = `<div class="door-icon">🚪</div><div class="door-num">${i + 1}번 방</div>`;
    map.appendChild(door);
  });
  view.appendChild(map);

  const total = currentStages.length;
  const destPct = total > 1 ? (currentStage / (total - 1)) * 100 : 50;
  const startPct = currentStage === 0 ? 0 : (total > 1 ? ((currentStage - 1) / (total - 1)) * 100 : 50);

  // 시작 위치에 즉시 배치(애니메이션 없이) 후, 다음 프레임에 목적지로 걸어가게 한다
  charEl.style.transition = 'none';
  charEl.style.left = startPct + '%';
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      charEl.style.transition = '';
      charEl.style.left = destPct + '%';
      setTimeout(() => {
        charEl.classList.add('bounce');
        setTimeout(() => charEl.classList.remove('bounce'), 500);
      }, 950);
    });
  });
}

// ────────────────────────────────────────────────
function renderStage() {
  const st = currentStages[currentStage];
  document.getElementById('stage-info').textContent = `STAGE ${st.id} / ${currentStages.length}`;
  document.getElementById('stage-name').textContent = st.name;
  document.getElementById('hint-text').textContent = st.hint;
  document.getElementById('kid-hint-text').textContent = st.kidHint || '';
  document.getElementById('kid-hint-body').classList.remove('open');
  document.getElementById('kid-hint-arrow').textContent = '▾';

  const view = document.getElementById('room-view');
  view.innerHTML = '';

  // 복도 지도: 어떤 방에 들어갈지 보여주고 캐릭터가 걸어 들어간다
  renderHallMap(view);

  // 방 아트
  const art = document.createElement('div');
  art.className = 'room-art';
  art.innerHTML = `<div>${st.art}</div><div class="room-sub">${st.artSub}</div>`;
  view.appendChild(art);

  // 단서
  const clue = document.createElement('div');
  clue.className = 'clue-card';
  clue.innerHTML = `<h3>🔍 단서</h3><div class="clue-text">${st.clue.replace(/\n/g,'<br>')}</div>`;
  view.appendChild(clue);

  // 퍼즐
  if (st.type === 'digits') renderDigitPuzzle(view, st);
  else if (st.type === 'choice') renderChoicePuzzle(view, st);
  else if (st.type === 'order') renderOrderPuzzle(view, st);
  else if (st.type === 'text') renderTextPuzzle(view, st);
}

// ── 주관식(텍스트 입력) 퍼즐
function renderTextPuzzle(view, st) {
  const area = document.createElement('div');
  area.className = 'puzzle-area';
  area.innerHTML = '<h3>✏️ 정답을 입력하세요</h3>';

  const input = document.createElement('input');
  input.type = 'text';
  input.className = 'text-answer-input';
  input.placeholder = '답을 입력하고 제출을 누르세요';
  input.maxLength = 20;
  input.autocomplete = 'off';

  const fb = document.createElement('div');
  fb.className = 'feedback';

  const norm = s => String(s).trim().toLowerCase().replace(/\s+/g, '');
  const accepted = (Array.isArray(st.answer) ? st.answer : [st.answer]).map(norm);

  const submitBtn = document.createElement('button');
  submitBtn.className = 'submit-btn';
  submitBtn.textContent = '🔓 제출하기';

  const skipBtn = document.createElement('button');
  skipBtn.className = 'submit-btn skip-btn';
  skipBtn.textContent = '🤷 모르겠어요 (건너뛰기)';

  const lockAll = () => { submitBtn.disabled = true; skipBtn.disabled = true; input.disabled = true; };

  submitBtn.onclick = () => {
    const ans = norm(input.value);
    if (ans && accepted.includes(ans)) {
      fb.textContent = '✅ 정답!';
      fb.className = 'feedback ok';
      lockAll();
      showExplanation(view, st);
    } else {
      fb.textContent = '❌ 틀렸어요. 다시 생각해보세요!';
      fb.className = 'feedback err';
    }
  };
  input.addEventListener('keydown', e => { if (e.key === 'Enter') submitBtn.click(); });

  skipBtn.onclick = () => {
    fb.textContent = '⏭️ 건너뛰었어요. 정답을 확인해보세요!';
    fb.className = 'feedback';
    lockAll();
    showExplanation(view, st);
  };

  area.appendChild(input);
  area.appendChild(submitBtn);
  area.appendChild(skipBtn);
  area.appendChild(fb);
  view.appendChild(area);
}

// ── 숫자 자물쇠 퍼즐
function renderDigitPuzzle(view, st) {
  const area = document.createElement('div');
  area.className = 'puzzle-area';
  area.innerHTML = '<h3>🔒 자물쇠</h3>';

  const values = Array(st.digits).fill(0);
  const lock = document.createElement('div');
  lock.className = 'digit-lock';

  values.forEach((_, i) => {
    const slot = document.createElement('div');
    slot.className = 'digit-slot';
    const up = document.createElement('button');
    up.textContent = '▲';
    const val = document.createElement('div');
    val.className = 'digit-val';
    val.textContent = '0';
    const dn = document.createElement('button');
    dn.textContent = '▼';
    up.onclick = () => { values[i] = (values[i]+1)%10; val.textContent = values[i]; };
    dn.onclick = () => { values[i] = (values[i]+9)%10; val.textContent = values[i]; };
    slot.appendChild(up); slot.appendChild(val); slot.appendChild(dn);
    lock.appendChild(slot);
  });
  area.appendChild(lock);

  const fb = document.createElement('div');
  fb.className = 'feedback';
  const btn = document.createElement('button');
  btn.className = 'submit-btn';
  btn.textContent = '🔓 열기';
  btn.onclick = () => {
    const correct = st.answer.every((v, i) => v === values[i]);
    if (correct) {
      fb.textContent = '✅ 정답!';
      fb.className = 'feedback ok';
      btn.disabled = true;
      showExplanation(view, st);
    } else {
      fb.textContent = '❌ 틀렸어요. 다시 시도해보세요.';
      fb.className = 'feedback err';
    }
  };
  area.appendChild(btn);
  area.appendChild(fb);
  view.appendChild(area);
}

// ── 선택지 퍼즐
function renderChoicePuzzle(view, st) {
  const area = document.createElement('div');
  area.className = 'puzzle-area';
  area.innerHTML = `<h3>❓ ${st.question}</h3>`;

  const grid = document.createElement('div');
  grid.className = 'choice-grid';
  let selected = null;
  const fb = document.createElement('div');
  fb.className = 'feedback';

  st.choices.forEach((ch, i) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = ch;
    btn.onclick = () => {
      if (!gameActive) return;
      document.querySelectorAll('.choice-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      selected = i;
      if (i === st.answer) {
        btn.classList.add('correct');
        fb.textContent = '✅ 정답!'; fb.className = 'feedback ok';
        showExplanation(view, st);
      } else {
        btn.classList.add('wrong');
        fb.textContent = '❌ 틀렸어요!'; fb.className = 'feedback err';
        setTimeout(() => { btn.classList.remove('wrong','selected'); selected=null; fb.textContent=''; fb.className='feedback'; }, 600);
      }
    };
    grid.appendChild(btn);
  });
  area.appendChild(grid);
  area.appendChild(fb);
  view.appendChild(area);
}

  const list = document.createElement('div');

  const fb = document.createElement('div');
  fb.className = 'feedback';
  const btn = document.createElement('button');
  btn.className = 'submit-btn';
  btn.textContent = '✅ 순서 확인';
  btn.disabled = true;

  const itemEls = items.map((item, i) => {
    const el = document.createElement('div');
    el.className = 'order-item';
    el.dataset.idx = i;
    const rank = document.createElement('div');
    rank.className = 'order-rank';
    rank.textContent = '-';
    const label = document.createElement('div');
    label.className = 'order-label';
    label.textContent = item;
    el.appendChild(rank);
    el.appendChild(label);
    el.onclick = () => {
      if (playerOrder.includes(i)) {
        // deselect
        const pos = playerOrder.indexOf(i);
        playerOrder.splice(pos, 1);
        el.classList.remove('selected');
        // re-rank remaining
        itemEls.forEach((e, idx) => {
          const p = playerOrder.indexOf(idx);
          e.querySelector('.order-rank').textContent = p >= 0 ? p+1 : '-';
        });
      } else {
        playerOrder.push(i);
        el.classList.add('selected');
        rank.textContent = playerOrder.length;
      }
      btn.disabled = playerOrder.length !== items.length;
    };
    list.appendChild(el);
    return el;
  });

  btn.onclick = () => {
    const correct = playerOrder.every((v, i) => v === st.answer[i]);
    if (correct) {
      fb.textContent = '✅ 정답!'; fb.className = 'feedback ok';
      btn.disabled = true;
      showExplanation(view, st);
    } else {
      fb.textContent = '❌ 순서가 틀렸어요. 다시 선택해보세요.';
      fb.className = 'feedback err';
      // reset
      playerOrder.length = 0;
      itemEls.forEach(e => { e.classList.remove('selected'); e.querySelector('.order-rank').textContent = '-'; });
      btn.disabled = true;
    }
  };

  area.appendChild(list);
  area.appendChild(btn);
  area.appendChild(fb);
  view.appendChild(area);
}

// ── 해설 카드 표시
function showExplanation(view, st) {
  const card = document.createElement('div');
  card.className = 'explanation-card';
  card.innerHTML = `<h3>📖 해설</h3><p>${st.explanation}</p>`;
  const nextBtn = document.createElement('button');
  nextBtn.className = 'next-stage-btn';
  nextBtn.textContent = currentStage + 1 >= currentStages.length ? '🎉 탈출하기!' : '다음 방으로 →';
  nextBtn.addEventListener('pointerdown', () => nextStage());
  card.appendChild(nextBtn);
  view.appendChild(card);
  setTimeout(() => card.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 100);
}

// ── 다음 스테이지 or 클리어
function nextStage() {
  currentStage++;
  if (currentStage >= currentStages.length) {
    showClear();
  } else {
    document.getElementById('room-view').scrollIntoView({ behavior:'smooth' });
    setTimeout(() => renderStage(), 200);
  }
}

// ── 힌트
document.getElementById('hint-btn').addEventListener('click', () => {
  document.getElementById('hint-modal').classList.add('on');
});
document.getElementById('kid-hint-toggle').addEventListener('click', () => {
  const body = document.getElementById('kid-hint-body');
  const arrow = document.getElementById('kid-hint-arrow');
  body.classList.toggle('open');
  arrow.textContent = body.classList.contains('open') ? '▴' : '▾';
});
document.getElementById('hint-close').addEventListener('click', () => {
  document.getElementById('hint-modal').classList.remove('on');
});
document.getElementById('hint-modal').addEventListener('click', e => {
  if (e.target === document.getElementById('hint-modal'))
    document.getElementById('hint-modal').classList.remove('on');
});

// ── 버튼 (start-btn 제거됨 - 난이도 버튼이 selectGrade() 직접 호출)
document.getElementById('retry-btn').addEventListener('click', () => startGame());
document.getElementById('retry-btn2').addEventListener('click', () => startGame());
</script>
