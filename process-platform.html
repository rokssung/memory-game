/* ── 미니 Zustand ── */
function createStore(init) {
  let state;
  const listeners = new Set();
  const setState = (up) => {
    const patch = typeof up === 'function' ? up(state) : up;
    state = { ...state, ...patch };
    listeners.forEach(l => l());
  };
  const getState = () => state;
  state = init(setState, getState);

  function useStore(sel) {
    sel = sel || (s => s);
    const [, tick] = React.useReducer(x => x + 1, 0);
    const selRef = React.useRef(sel);
    selRef.current = sel;
    const valRef = React.useRef(sel(state));
    React.useEffect(() => {
      const check = () => {
        const next = selRef.current(state);
        if (next !== valRef.current) { valRef.current = next; tick(); }
      };
      listeners.add(check);
      return () => listeners.delete(check);
    }, []);
    return sel(state);
  }
  useStore.getState = getState;
  useStore.setState = setState;
  return useStore;
}

function withPersist(init, key) {
  return (set, get) => {
    const pset = (up) => { set(up); try { localStorage.setItem(key, JSON.stringify(get())); } catch {} };
    const base = init(pset, get);
    try { const s = localStorage.getItem(key); if (s) return { ...base, ...JSON.parse(s) }; } catch {}
    return base;
  };
}

/* ── 미니 해시 라우터 ── */
function getHash() { return window.location.hash.slice(1) || '/'; }

function createRouter() {
  let listeners = new Set();
  window.addEventListener('hashchange', () => listeners.forEach(l => l()));
  return {
    getPath: getHash,
    push: (path) => { window.location.hash = path; },
    subscribe: (fn) => { listeners.add(fn); return () => listeners.delete(fn); }
  };
}
const router = createRouter();

function useRouter() {
  const [path, setPath] = React.useState(router.getPath);
  React.useEffect(() => router.subscribe(() => setPath(router.getPath())), []);
  return { path, push: router.push };
}

function Link({ to, children, className }) {
  return React.createElement('a', {
    href: '#' + to,
    className,
    onClick: (e) => { e.preventDefault(); router.push(to); }
  }, children);
}

function matchPath(pattern, path) {
  const patParts = pattern.split('/').filter(Boolean);
  const pathParts = path.split('/').filter(Boolean);
  if (patParts.length !== pathParts.length) return null;
  const params = {};
  for (let i = 0; i < patParts.length; i++) {
    if (patParts[i].startsWith(':')) params[patParts[i].slice(1)] = pathParts[i];
    else if (patParts[i] !== pathParts[i]) return null;
  }
  return params;
}

const DEFINITIONS = [TASK_MANAGEMENT, SPEC_REVIEW];

/* ── 엔진 유틸 ── */
function evalCond(rule, ctx) {
  if (rule === null || rule === true) return true;
  if (rule === false) return false;
  try { return Boolean(jsonLogic.apply(rule, ctx)); } catch { return false; }
}
function getAvailTrans(def, stateId, ctx) {
  return def.transitions.filter(t => t.from === stateId && evalCond(t.condition, ctx));
}
function getStateDef(def, id) { return def.states.find(s => s.id === id); }
function interpolate(tmpl, ctx) {
  return tmpl.replace(/\{\{(\w+)\}\}/g, (_, k) => ctx[k] != null ? String(ctx[k]) : '');
}
let _seq = 0;
function genId() { return `${Date.now().toString(36)}-${(++_seq).toString(36)}`; }

<script>
/* ── Stores ── */
const useProcessStore = createStore(withPersist((set, get) => ({
  instances: [],
  createInstance: (inst) => set(s => ({ instances: [...s.instances, inst] })),
  updateContext: (id, patch) => set(s => ({
    instances: s.instances.map(i => i.id !== id ? i : {
      ...i, context: { ...i.context, ...patch }, updatedAt: new Date().toISOString()
    })
  })),
  doTransition: (id, tId, tLabel, nextId, nextLabel, isFinal, status) => set(s => ({
    instances: s.instances.map(inst => {
      if (inst.id !== id) return inst;
      const now = new Date().toISOString();
      const hist = inst.history.map((h, i) =>
        i === inst.history.length - 1 ? { ...h, exitedAt: now, transitionId: tId, transitionLabel: tLabel } : h
      );
      return {
        ...inst, currentState: nextId,
        status: status ?? (isFinal ? 'completed' : 'active'),
        history: [...hist, { stateId: nextId, stateLabel: nextLabel, enteredAt: now, contextSnapshot: { ...inst.context } }],
        updatedAt: now,
      };
    })
  })),
  deleteInstance: (id) => set(s => ({ instances: s.instances.filter(i => i.id !== id) }))
}), 'pp-v1'));

let _tseq = 0;
const useNotifStore = createStore((set) => ({
  toasts: [],
  push: (msg, level = 'info') => {
    const id = `t${++_tseq}`;
    set(s => ({ toasts: [...s.toasts, { id, msg, level }] }));
    setTimeout(() => set(s => ({ toasts: s.toasts.filter(t => t.id !== id) })), 4000);
  },
  dismiss: (id) => set(s => ({ toasts: s.toasts.filter(t => t.id !== id) }))
}));
</script>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

/* ── Toast ── */
function ToastContainer() {
  const { toasts, dismiss } = useNotifStore();
  const colors = { info:'bg-blue-600', success:'bg-green-600', warning:'bg-yellow-500', error:'bg-red-600' };
  return (
    <div className="fixed bottom-4 right-4 z-50 flex flex-col gap-2 pointer-events-none">
      {toasts.map(t => (
        <div key={t.id} className={`${colors[t.level]||'bg-gray-700'} text-white px-4 py-3 rounded-lg shadow-lg flex items-start gap-3 pointer-events-auto max-w-sm animate-fade-in`}>
          <span className="text-sm flex-1">{t.msg}</span>
          <button onClick={() => dismiss(t.id)} className="text-white/70 hover:text-white text-xl leading-none">×</button>
        </div>
      ))}
    </div>
  );
}

/* ── StepNav ── */
function StepNav({ def, instance }) {
  const idx = def.states.findIndex(s => s.id === instance.currentState);
  return (
    <div className="bg-white rounded-xl border border-gray-200 shadow-sm p-4">
      <div className="flex items-center overflow-x-auto">
        {def.states.map((state, i) => {
          const done = i < idx, cur = i === idx;
          return (
            <div key={state.id} className="flex items-center flex-shrink-0">
              <div className="flex flex-col items-center">
                <div className={`w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold transition-colors ${done?'bg-green-500 text-white':cur?'bg-blue-600 text-white ring-2 ring-blue-300':'bg-gray-200 text-gray-400'}`}>
                  {done ? '✓' : i+1}
                </div>
                <span className={`text-xs mt-1 w-16 text-center leading-tight ${cur?'text-blue-600 font-semibold':i>idx?'text-gray-400':'text-gray-500'}`}>
                  {state.label}
                </span>
              </div>
              {i < def.states.length - 1 && (
                <div className={`h-0.5 w-8 mb-4 mx-1 ${i < idx?'bg-green-400':'bg-gray-200'}`} />
              )}
            </div>
          );
        })}
      </div>
      <div className="mt-2 pt-2 border-t border-gray-100 flex items-center justify-between text-xs text-gray-500">
        <span className="font-medium">{instance.title}</span>
        <span className={`px-2 py-0.5 rounded-full font-medium ${instance.status==='completed'?'bg-green-100 text-green-700':instance.status==='rejected'?'bg-red-100 text-red-700':'bg-blue-100 text-blue-700'}`}>
          {instance.status==='completed'?'완료':instance.status==='rejected'?'반려':'진행중'}
        </span>
      </div>
    </div>
  );
}

/* ── Form Module ── */
function FormModule({ config, context, onContextUpdate, availableTransitions, onTransition }) {
  const formRef = useRef(null);
  const [errors, setErrors] = useState({});

  function readValues() {
    const form = formRef.current;
    if (!form) return {};
    const vals = {};
    for (const f of config.fields) {
      const el = form.querySelector(`[data-key="${f.key}"]`);
      if (!el) continue;
      vals[f.key] = el.type === 'checkbox' ? el.checked : el.value;
    }
    return vals;
  }

  function handleSubmit(tId) {
    const vals = readValues();
    const e = {};
    for (const f of config.fields)
      if (f.required && !vals[f.key] && vals[f.key] !== 0) e[f.key] = `${f.label}은(는) 필수입니다.`;
    setErrors(e);
    if (Object.keys(e).length > 0) return;
    onContextUpdate(vals);
    onTransition(tId);
  }

  return (
    <div className="space-y-6">
      <h2 className="text-xl font-semibold text-gray-800">{config.title}</h2>
      <div className="space-y-4" ref={formRef}>
        {config.fields.map(f => (
          <div key={f.key}>
            <label className="block text-sm font-medium text-gray-700 mb-1">
              {f.label}{f.required && <span className="text-red-500 ml-1">*</span>}
            </label>
            {f.type==='select' ? (
              <select data-key={f.key}
                className="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                defaultValue={String(context[f.key]||'')}>
                <option value="">선택하세요</option>
                {(f.options||[]).map(o => <option key={o} value={o}>{o}</option>)}
              </select>
            ) : f.type==='text' ? (
              <textarea rows={4} data-key={f.key} placeholder={f.placeholder||''}
                className="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                defaultValue={String(context[f.key]||'')} />
            ) : (
              <input type="text" data-key={f.key} placeholder={f.placeholder||''}
                className="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                defaultValue={String(context[f.key]||'')} />
            )}
            {errors[f.key] && <p className="text-red-500 text-xs mt-1">{errors[f.key]}</p>}
          </div>
        ))}
      </div>
      <div className="flex gap-3 pt-2">
        {availableTransitions.map(t => (
          <button key={t.id} onClick={() => handleSubmit(t.id)}
            className="px-5 py-2 bg-blue-600 text-white text-sm font-medium rounded-lg hover:bg-blue-700 transition-colors">
            {t.label}
          </button>
        ))}
      </div>
    </div>
  );
}

/* ── Approval Module ── */
function ApprovalModule({ config, context, onContextUpdate, availableTransitions, onTransition }) {
  const [comment, setComment] = useState(config.commentKey ? String(context[config.commentKey]||'') : '');

  function decide(approved, tId) {
    const patch = { [config.resultKey]: approved };
    if (config.commentKey) patch[config.commentKey] = comment;
    onContextUpdate(patch);
    onTransition(tId);
  }

  const approveT = availableTransitions.find(t => t.label.includes('승인')||t.label.includes('통과')) ?? availableTransitions[0];
  const rejectT  = availableTransitions.find(t => t.label.includes('반려')||t.label.includes('수정')||t.label.includes('재')) ?? availableTransitions[1];

  const contextEntries = Object.entries(context).filter(([,v]) => v !== undefined && v !== '' && v !== false);

  return (
    <div className="space-y-6">
      <h2 className="text-xl font-semibold text-gray-800">{config.title}</h2>
      {config.description && <p className="text-sm text-gray-500">{config.description}</p>}
      {contextEntries.length > 0 && (
        <div className="bg-gray-50 rounded-xl border border-gray-100 p-4 space-y-2">
          <p className="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-3">현재 내용</p>
          {contextEntries.map(([k, v]) => (
            <div key={k} className="flex gap-3 text-sm">
              <span className="text-gray-400 w-28 flex-shrink-0">{k}</span>
              <span className="text-gray-800">{String(v)}</span>
            </div>
          ))}
        </div>
      )}
      {config.commentKey !== undefined && (
        <div>
          <label className="block text-sm font-medium text-gray-700 mb-1">코멘트 (선택)</label>
          <textarea rows={3} placeholder="검토 의견을 입력하세요"
            className="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
            value={comment} onChange={e => setComment(e.target.value)} />
        </div>
      )}
      <div className="flex gap-3 pt-2">
        {approveT && (
          <button onClick={() => decide(true, approveT.id)}
            className="px-5 py-2 bg-green-600 text-white text-sm font-medium rounded-lg hover:bg-green-700 transition-colors">
            ✓ {config.approveLabel||approveT.label}
          </button>
        )}
        {rejectT && (
          <button onClick={() => decide(false, rejectT.id)}
            className="px-5 py-2 bg-red-500 text-white text-sm font-medium rounded-lg hover:bg-red-600 transition-colors">
            ✕ {config.rejectLabel||rejectT.label}
          </button>
        )}
      </div>
    </div>
  );
}

/* ── Notification Module ── */
function NotificationModule({ config, context, availableTransitions, onTransition, onComplete }) {
  const push = useNotifStore(s => s.push);
  const fired = useRef(false);
  const message = interpolate(config.messageTemplate, context);
  useEffect(() => {
    if (fired.current) return;
    fired.current = true;
    push(message, 'info');
    if (config.autoAdvance) {
      const t = availableTransitions[0];
      setTimeout(() => { if (t) onTransition(t.id); else onComplete(); }, 800);
    }
  }, []);
  return (
    <div className="space-y-4">
      <h2 className="text-xl font-semibold text-gray-800">{config.title}</h2>
      <div className="bg-blue-50 border border-blue-200 rounded-xl p-5 text-sm text-blue-800">{message}</div>
      {!config.autoAdvance && (
        <div className="flex gap-3">
          {availableTransitions.map(t => (
            <button key={t.id} onClick={() => onTransition(t.id)}
              className="px-5 py-2 bg-blue-600 text-white text-sm font-medium rounded-lg hover:bg-blue-700 transition-colors">{t.label}</button>
          ))}
        </div>
      )}
    </div>
  );
}

/* ── Document Gen Module ── */
function DocumentGenModule({ config, context, onContextUpdate, availableTransitions, onTransition }) {
  const generated = interpolate(config.template, context);
  const saved = useRef(false);
  useEffect(() => {
    if (saved.current) return;
    saved.current = true;
    onContextUpdate({ [config.outputKey]: generated });
  }, []);
  function download() {
    const blob = new Blob([generated], { type:'text/plain' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `${config.outputKey}.txt`; a.click();
    URL.revokeObjectURL(url);
  }
  return (
    <div className="space-y-4">
      <h2 className="text-xl font-semibold text-gray-800">{config.title}</h2>
      <div className="bg-white border border-gray-200 rounded-xl p-6 font-mono text-sm whitespace-pre-wrap leading-relaxed shadow-inner">{generated}</div>
      <div className="flex gap-3">
        <button onClick={download} className="px-4 py-2 border border-gray-300 text-sm font-medium rounded-lg hover:bg-gray-50 transition-colors">⬇ 다운로드</button>
        {availableTransitions.map(t => (
          <button key={t.id} onClick={() => onTransition(t.id)}
            className="px-5 py-2 bg-blue-600 text-white text-sm font-medium rounded-lg hover:bg-blue-700 transition-colors">{t.label}</button>
        ))}
      </div>
    </div>
  );
}

/* ── Dashboard Module ── */
function DashboardModule({ config, instanceId }) {
  const { path, push } = useRouter();
  const instances = useProcessStore(s => s.instances);
  const cur = instances.find(i => i.id === instanceId);
  const peers = instances.filter(i => i.definitionId === cur?.definitionId);

  return (
    <div className="space-y-4">
      <h2 className="text-xl font-semibold text-gray-800">{config.title}</h2>
      <p className="text-sm text-gray-500">이 프로세스의 모든 인스턴스를 현황판으로 봅니다.</p>
      <div className="flex gap-3 overflow-x-auto pb-2">
        {config.columns.map(col => {
          const cards = peers.filter(inst => inst.currentState === col.value);
          return (
            <div key={col.value} className="flex-shrink-0 w-56">
              <div className="bg-gray-100 rounded-t-lg px-3 py-2 flex items-center justify-between">
                <span className="text-sm font-semibold text-gray-700">{col.label}</span>
                <span className="text-xs bg-white text-gray-600 rounded-full px-2 py-0.5 shadow-sm">{cards.length}</span>
              </div>
              <div className="bg-gray-50 rounded-b-lg min-h-24 p-2 space-y-2 border border-t-0 border-gray-200">
                {cards.map(inst => (
                  <button key={inst.id} onClick={() => push(`/process/${inst.definitionId}/${inst.id}`)}
                    className={`w-full text-left bg-white border rounded-lg p-3 shadow-sm hover:shadow-md transition-shadow text-sm ${inst.id===instanceId?'border-blue-400 ring-1 ring-blue-300':'border-gray-200'}`}>
                    <p className="font-medium text-gray-800 truncate">{String(inst.context[config.cardTitleKey]||inst.title)}</p>
                    {config.cardSubtitleKey && <p className="text-xs text-gray-500 mt-0.5 truncate">{String(inst.context[config.cardSubtitleKey]||'')}</p>}
                  </button>
                ))}
                {cards.length === 0 && <p className="text-xs text-gray-400 text-center py-4">없음</p>}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ── Module Registry ── */
const MODULES = { form:FormModule, approval:ApprovalModule, notification:NotificationModule, 'document-gen':DocumentGenModule, dashboard:DashboardModule };

/* ── ProcessRenderer ── */
function ProcessRenderer({ def, instance }) {
  const { updateContext, doTransition } = useProcessStore();
  const push = useNotifStore(s => s.push);

  const stateDef = getStateDef(def, instance.currentState);
  if (!stateDef) return <div className="text-red-500 p-4">알 수 없는 상태: {instance.currentState}</div>;

  const avail = getAvailTrans(def, instance.currentState, instance.context);

  function handleTransition(tId) {
    const t = def.transitions.find(tr => tr.id === tId);
    if (!t) return;
    const next = getStateDef(def, t.to);
    if (!next) return;
    const isFinal = !!next.terminal;
    const isReject = t.label.includes('반려') || t.label.includes('재수정') || t.label.includes('수정 요청');
    const status = isFinal ? (isReject ? 'rejected' : 'completed') : 'active';
    doTransition(instance.id, t.id, t.label, t.to, next.label, isFinal, status);
    push(`${t.label} → ${next.label}`, isFinal ? (isReject?'error':'success') : 'info');
  }

  const ModComp = MODULES[stateDef.module.type];
  if (!ModComp) return <div className="text-red-500 p-4">알 수 없는 모듈: {stateDef.module.type}</div>;

  return (
    <div className="flex flex-col gap-5">
      <StepNav def={def} instance={instance} />
      <div className="bg-white rounded-xl border border-gray-200 shadow-sm p-6">
        <ModComp
          config={stateDef.module.config}
          context={instance.context}
          onContextUpdate={patch => updateContext(instance.id, patch)}
          onComplete={() => { const a = avail.find(t => t.trigger==='auto'); if (a) handleTransition(a.id); }}
          availableTransitions={avail}
          onTransition={handleTransition}
          instanceId={instance.id}
        />
      </div>
    </div>
  );
}

/* ── Instance List ── */
function InstanceList({ instances }) {
  const { push } = useRouter();
  const { deleteInstance } = useProcessStore();
  return (
    <div className="space-y-2">
      {instances.map(inst => {
        const def = DEFINITIONS.find(d => d.id === inst.definitionId);
        const curState = def?.states.find(s => s.id === inst.currentState);
        return (
          <div key={inst.id} onClick={() => push(`/process/${inst.definitionId}/${inst.id}`)}
            className="bg-white rounded-xl border border-gray-200 px-4 py-3 flex items-center justify-between hover:bg-gray-50 cursor-pointer transition-colors">
            <div className="flex items-center gap-3">
              <span className="text-2xl">{def?.icon}</span>
              <div>
                <p className="text-sm font-medium text-gray-800">{inst.title}</p>
                <p className="text-xs text-gray-400 mt-0.5">{def?.name} · {curState?.label}</p>
              </div>
            </div>
            <div className="flex items-center gap-3">
              <span className={`text-xs px-2.5 py-0.5 rounded-full font-medium ${inst.status==='completed'?'bg-green-100 text-green-700':inst.status==='rejected'?'bg-red-100 text-red-700':'bg-blue-100 text-blue-700'}`}>
                {inst.status==='completed'?'완료':inst.status==='rejected'?'반려':'진행중'}
              </span>
              <button onClick={e => { e.stopPropagation(); deleteInstance(inst.id); }}
                className="text-gray-300 hover:text-red-400 text-xl leading-none transition-colors">×</button>
            </div>
          </div>
        );
      })}
    </div>
  );
}

/* ── Home Page ── */
function HomePage() {
  const { push } = useRouter();
  const { createInstance, instances } = useProcessStore();

  function start(def) {
    const now = new Date().toISOString();
    const n = instances.filter(i => i.definitionId === def.id).length + 1;
    const firstState = def.states[0];
    const inst = {
      id: genId(), definitionId: def.id, definitionVersion: def.version,
      title: `${def.name} #${n}`, currentState: def.initialState, status: 'active',
      context: {},
      history: [{ stateId: def.initialState, stateLabel: firstState.label, enteredAt: now, contextSnapshot: {} }],
      createdAt: now, updatedAt: now,
    };
    createInstance(inst);
    push(`/process/${def.id}/${inst.id}`);
  }

  const active   = instances.filter(i => i.status === 'active');
  const finished = instances.filter(i => i.status !== 'active');

  return (
    <div className="max-w-4xl mx-auto py-10 px-4 space-y-10">
      <div>
        <h1 className="text-3xl font-bold text-gray-900">Process Platform</h1>
        <p className="text-gray-500 mt-1">JSON 설정으로 정의된 업무 프로세스를 실행하는 메타 시스템</p>
      </div>

      <section>
        <h2 className="text-lg font-semibold text-gray-700 mb-4">프로세스 시작</h2>
        <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
          {DEFINITIONS.map(def => (
            <div key={def.id} className="bg-white rounded-xl border border-gray-200 shadow-sm p-5 hover:shadow-md transition-shadow">
              <div className="flex items-center gap-2 mb-2">
                <span className="text-2xl">{def.icon}</span>
                <h3 className="text-base font-semibold text-gray-900">{def.name}</h3>
              </div>
              <p className="text-sm text-gray-500">{def.description}</p>
              <div className="flex items-center gap-2 mt-2 mb-4">
                <span className="text-xs text-gray-400">v{def.version}</span>
                <span className="text-gray-200">·</span>
                <span className="text-xs text-gray-400">인스턴스 {instances.filter(i=>i.definitionId===def.id).length}개</span>
                <span className="text-gray-200">·</span>
                <span className="text-xs text-gray-400">{def.states.length}단계</span>
              </div>
              <button onClick={() => start(def)}
                className="w-full py-2 bg-blue-600 text-white text-sm font-medium rounded-lg hover:bg-blue-700 transition-colors">
                + 새 인스턴스 시작
              </button>
            </div>
          ))}
        </div>
      </section>

      {active.length > 0 && (
        <section>
          <h2 className="text-lg font-semibold text-gray-700 mb-3">진행중 <span className="text-blue-500 font-bold">{active.length}</span></h2>
          <InstanceList instances={active} />
        </section>
      )}

      {finished.length > 0 && (
        <section>
          <h2 className="text-lg font-semibold text-gray-700 mb-3">완료/반려</h2>
          <InstanceList instances={finished} />
        </section>
      )}
    </div>
  );
}

/* ── Process Page ── */
function ProcessPage({ defId, instanceId }) {
  const { push } = useRouter();
  const instances = useProcessStore(s => s.instances);
  const def = DEFINITIONS.find(d => d.id === defId);
  const instance = instances.find(i => i.id === instanceId);

  if (!def) return <div className="p-8 text-gray-500">프로세스 없음: {defId}</div>;
  if (!instance) return (
    <div className="p-8 text-center text-gray-500">
      <p>인스턴스를 찾을 수 없습니다.</p>
      <button onClick={() => push('/')} className="mt-3 text-blue-600 hover:underline text-sm">← 홈으로</button>
    </div>
  );

  return (
    <div className="min-h-screen bg-gray-50">
      <header className="bg-white border-b border-gray-200 px-5 py-3 flex items-center gap-3 sticky top-0 z-10">
        <button onClick={() => push('/')} className="text-blue-600 hover:text-blue-800 text-sm font-medium">← 홈</button>
        <span className="text-gray-200">|</span>
        <span className="text-sm font-medium text-gray-700">{def.icon} {def.name}</span>
        <span className="text-gray-200">|</span>
        <span className="text-sm text-gray-500">{instance.title}</span>
      </header>
      <main className="max-w-3xl mx-auto py-8 px-4">
        <ProcessRenderer def={def} instance={instance} />
      </main>
    </div>
  );
}

/* ── App (Hash Router) ── */
function App() {
  const { path } = useRouter();
  const params = matchPath('/process/:defId/:instanceId', path);
  return (
    <div>
      {params ? <ProcessPage defId={params.defId} instanceId={params.instanceId} /> : <HomePage />}
      <ToastContainer />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
