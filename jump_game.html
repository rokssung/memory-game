<title>점프 히어로 🎮</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #1a1a2e;
    overflow: hidden;
    user-select: none;
    touch-action: none;
  }
  #canvas-wrapper {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #1a1a2e;
  }
  canvas { display: block; }
</style>

<body>
<div id="canvas-wrapper">
  <canvas id="gameCanvas"></canvas>
</div>

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
// 내부 논리 해상도 고정
const LOGIC_W = 800;
const LOGIC_H = 300;

canvas.width = LOGIC_W;
canvas.height = LOGIC_H;

// 화면 꽉 채우기 (세로/가로 모두)
function resizeCanvas() {
  const vw = window.innerWidth;
  const vh = window.innerHeight;
  const scale = Math.min(vw / LOGIC_W, vh / LOGIC_H);
  canvas.style.width = (LOGIC_W * scale) + 'px';
  canvas.style.height = (LOGIC_H * scale) + 'px';
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);
screen.orientation && screen.orientation.addEventListener('change', resizeCanvas);

// 게임 상태
let score = 0;
let gameOver = false;
let started = false;
let speed = 4;
let frameCount = 0;

// 배경 구름
let clouds = [
  { x: 100, y: 40, w: 80, h: 30 },
  { x: 350, y: 60, w: 60, h: 25 },
  { x: 600, y: 30, w: 100, h: 35 },
];

// 배경 산
let mountains = [
  { x: 0, y: 180, w: 200, h: 120 },
  { x: 180, y: 195, w: 160, h: 105 },
  { x: 400, y: 175, w: 220, h: 125 },
  { x: 620, y: 185, w: 180, h: 115 },
];

// 플레이어
const player = {
  x: 100,
  y: 220,
  w: 40,
  h: 50,
  vy: 0,
  onGround: true,
  jumpCount: 0,
  frame: 0,
  frameTimer: 0,
  color: '#e94560',
  hatColor: '#c0392b',
};

const GROUND_Y = 250;
const GRAVITY = 0.6;
const JUMP_FORCE = -13;

// 장애물
let obstacles = [];
let obstacleTimer = 0;
let obstacleInterval = 90;

// 아이템
let items = [];
let itemTimer = 0;
let itemInterval = 280;

// 파워업 상태
let powerUp = { type: null, timer: 0, maxTimer: 0 };

// 파티클
let particles = [];

function spawnItem() {
  const type = Math.random() < 0.5 ? 'shield' : 'slow';
  items.push({ x: 820, y: GROUND_Y - 80 - Math.random() * 60, w: 28, h: 28, type, pulse: 0 });
}

function spawnObstacle() {
  const types = ['cactus', 'block', 'spike'];
  const type = types[Math.floor(Math.random() * types.length)];
  let h = type === 'spike' ? 30 : (type === 'block' ? 40 : 50);
  let w = type === 'cactus' ? 30 : (type === 'block' ? 45 : 35);
  obstacles.push({ x: 820, y: GROUND_Y - h, w, h, type });
}

function jump() {
  if (!started) {
    started = true;
    return;
  }
  if (gameOver) {
    restartGame();
    return;
  }
  if (player.jumpCount < 2) {
    player.vy = JUMP_FORCE;
    player.onGround = false;
    player.jumpCount++;
    spawnJumpParticles();
  }
}

function spawnJumpParticles() {
  for (let i = 0; i < 8; i++) {
    particles.push({
      x: player.x + player.w / 2,
      y: player.y + player.h,
      vx: (Math.random() - 0.5) * 4,
      vy: Math.random() * 3 + 1,
      life: 20,
      maxLife: 20,
      color: `hsl(${Math.random()*60+20}, 80%, 60%)`,
    });
  }
}

function restartGame() {
  score = 0;
  gameOver = false;
  started = true;
  speed = 4;
  frameCount = 0;
  obstacles = [];
  obstacleTimer = 0;
  obstacleInterval = 90;
  items = [];
  itemTimer = 0;
  powerUp = { type: null, timer: 0, maxTimer: 0 };
  particles = [];
  player.y = GROUND_Y - player.h;
  player.vy = 0;
  player.onGround = true;
  player.jumpCount = 0;
}

// 입력 - 클릭/터치/키보드
canvas.addEventListener('click', jump);
// 터치 이벤트
canvas.addEventListener('touchstart', e => { e.preventDefault(); jump(); }, { passive: false });
document.addEventListener('touchstart', e => {
  // 캔버스/버튼 외 영역 터치도 점프
  if (e.target !== canvas) {
    e.preventDefault();
    jump();
  }
}, { passive: false });

document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'ArrowUp') {
    e.preventDefault();
    jump();
  }
});

function checkCollision(a, b) {
  return a.x < b.x + b.w - 6 &&
         a.x + a.w - 6 > b.x + 6 &&
         a.y < b.y + b.h - 4 &&
         a.y + a.h > b.y + 4;
}

// 그리기 함수들
function drawBackground() {
  const skyGrad = ctx.createLinearGradient(0, 0, 0, 300);
  skyGrad.addColorStop(0, '#87CEEB');
  skyGrad.addColorStop(1, '#E0F0FF');
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, 800, 300);

  ctx.fillStyle = 'rgba(255,255,255,0.85)';
  clouds.forEach(c => {
    ctx.beginPath();
    ctx.ellipse(c.x, c.y, c.w/2, c.h/2, 0, 0, Math.PI*2);
    ctx.ellipse(c.x + c.w*0.25, c.y - c.h*0.2, c.w*0.3, c.h*0.4, 0, 0, Math.PI*2);
    ctx.ellipse(c.x - c.w*0.25, c.y - c.h*0.1, c.w*0.25, c.h*0.35, 0, 0, Math.PI*2);
    ctx.fill();
  });

  mountains.forEach(m => {
    ctx.fillStyle = '#8ab4c2';
    ctx.beginPath();
    ctx.moveTo(m.x, GROUND_Y);
    ctx.lineTo(m.x + m.w/2, m.y);
    ctx.lineTo(m.x + m.w, GROUND_Y);
    ctx.fill();
    ctx.fillStyle = 'white';
    ctx.beginPath();
    ctx.moveTo(m.x + m.w/2, m.y);
    ctx.lineTo(m.x + m.w/2 - 20, m.y + 30);
    ctx.lineTo(m.x + m.w/2 + 20, m.y + 30);
    ctx.fill();
  });

  const groundGrad = ctx.createLinearGradient(0, GROUND_Y, 0, 300);
  groundGrad.addColorStop(0, '#5D8A3C');
  groundGrad.addColorStop(0.15, '#4a7a2a');
  groundGrad.addColorStop(0.15, '#8B6914');
  groundGrad.addColorStop(1, '#6B4F10');
  ctx.fillStyle = groundGrad;
  ctx.fillRect(0, GROUND_Y, 800, 50);

  ctx.fillStyle = '#7CBA4A';
  ctx.fillRect(0, GROUND_Y, 800, 6);
}

function drawPlayer() {
  const px = player.x, py = player.y;

  ctx.fillStyle = 'rgba(0,0,0,0.15)';
  ctx.beginPath();
  ctx.ellipse(px + player.w/2, GROUND_Y + 2, player.w/2, 6, 0, 0, Math.PI*2);
  ctx.fill();

  if (player.onGround && started && !gameOver) {
    player.frameTimer++;
    if (player.frameTimer > 8) { player.frame = (player.frame + 1) % 4; player.frameTimer = 0; }
  }
  const legOffset = player.onGround ? Math.sin(player.frame * Math.PI/2) * 6 : 0;

  ctx.fillStyle = '#2c3e50';
  ctx.fillRect(px + 8, py + player.h - 14, 10, 14 + legOffset);
  ctx.fillRect(px + 22, py + player.h - 14, 10, 14 - legOffset);

  ctx.fillStyle = '#e74c3c';
  ctx.beginPath();
  ctx.roundRect(px + 5, py + player.h - 5 + legOffset, 14, 8, 3);
  ctx.fill();
  ctx.beginPath();
  ctx.roundRect(px + 19, py + player.h - 5 - legOffset, 14, 8, 3);
  ctx.fill();

  ctx.fillStyle = player.color;
  ctx.beginPath();
  ctx.roundRect(px + 4, py + 18, player.w - 8, player.h - 26, 5);
  ctx.fill();

  ctx.fillStyle = '#c0392b';
  ctx.fillRect(px + 10, py + 20, 6, 16);
  ctx.fillRect(px + 24, py + 20, 6, 16);

  // 얼굴 이미지 (원형 클립)
  const cx = px + player.w / 2;
  const cy = py + 12;
  const r = 16;
  ctx.save();
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.clip();
  if (faceImg.complete && faceImg.naturalWidth > 0) {
    ctx.drawImage(faceImg, cx - r, cy - r, r * 2, r * 2);
  } else {
    ctx.fillStyle = '#FDBCB4';
    ctx.fill();
  }
  ctx.restore();

  // 모자
  ctx.fillStyle = player.hatColor;
  ctx.beginPath();
  ctx.ellipse(cx, py + 2, 17, 5, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.beginPath();
  ctx.roundRect(cx - 10, py - 14, 20, 17, [4,4,0,0]);
  ctx.fill();
}

function drawObstacle(obs) {
  if (obs.type === 'cactus') {
    ctx.fillStyle = '#27ae60';
    ctx.fillRect(obs.x + 9, obs.y, 12, obs.h);
    ctx.fillRect(obs.x, obs.y + obs.h * 0.3, 10, 10);
    ctx.fillRect(obs.x + obs.w - 10, obs.y + obs.h * 0.4, 10, 10);
    ctx.fillStyle = '#1e8449';
    ctx.fillRect(obs.x + 11, obs.y, 8, 4);
  } else if (obs.type === 'block') {
    ctx.fillStyle = '#e67e22';
    ctx.beginPath();
    ctx.roundRect(obs.x, obs.y, obs.w, obs.h, 4);
    ctx.fill();
    ctx.fillStyle = '#d35400';
    ctx.fillRect(obs.x, obs.y, obs.w, 5);
    ctx.fillRect(obs.x, obs.y, 5, obs.h);
    ctx.fillStyle = '#f39c12';
    ctx.fillRect(obs.x + 5, obs.y + 5, obs.w - 10, obs.h - 10);
    ctx.fillStyle = '#e67e22';
    ctx.fillRect(obs.x + obs.w/2 - 4, obs.y + obs.h/2 - 4, 8, 8);
  } else {
    ctx.fillStyle = '#8e44ad';
    for (let i = 0; i < 3; i++) {
      ctx.beginPath();
      ctx.moveTo(obs.x + i * 12, obs.y + obs.h);
      ctx.lineTo(obs.x + i * 12 + 6, obs.y);
      ctx.lineTo(obs.x + i * 12 + 12, obs.y + obs.h);
      ctx.fill();
    }
  }
}

function drawItem(item) {
  item.pulse = (item.pulse || 0) + 0.08;
  const glow = Math.sin(item.pulse) * 0.3 + 0.7;
  const cx = item.x + item.w / 2, cy = item.y + item.h / 2;

  ctx.save();
  ctx.globalAlpha = glow;

  if (item.type === 'shield') {
    ctx.fillStyle = '#FFD700';
    ctx.shadowColor = '#FFD700';
    ctx.shadowBlur = 12;
    ctx.beginPath();
    for (let i = 0; i < 5; i++) {
      const outer = { x: cx + 14 * Math.cos((i * 4 * Math.PI / 5) - Math.PI/2), y: cy + 14 * Math.sin((i * 4 * Math.PI / 5) - Math.PI/2) };
      const inner = { x: cx + 6 * Math.cos(((i * 4 + 2) * Math.PI / 5) - Math.PI/2), y: cy + 6 * Math.sin(((i * 4 + 2) * Math.PI / 5) - Math.PI/2) };
      i === 0 ? ctx.moveTo(outer.x, outer.y) : ctx.lineTo(outer.x, outer.y);
      ctx.lineTo(inner.x, inner.y);
    }
    ctx.closePath();
    ctx.fill();
  } else {
    ctx.fillStyle = '#00BFFF';
    ctx.shadowColor = '#00BFFF';
    ctx.shadowBlur = 12;
    ctx.beginPath();
    ctx.arc(cx, cy, 13, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#003070';
    ctx.beginPath();
    ctx.arc(cx, cy, 10, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = 'white';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx, cy - 7);
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + 5, cy + 3);
    ctx.stroke();
  }
  ctx.restore();
}

function drawParticles() {
  particles.forEach(p => {
    ctx.globalAlpha = p.life / p.maxLife;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, 4 * (p.life / p.maxLife), 0, Math.PI*2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
}

function drawHUD() {
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.beginPath();
  ctx.roundRect(10, 10, 130, 36, 8);
  ctx.fill();
  ctx.fillStyle = 'white';
  ctx.font = 'bold 18px Arial';
  ctx.fillText(`점수: ${score}`, 22, 33);

  if (powerUp.type) {
    const ratio = powerUp.timer / powerUp.maxTimer;
    const label = powerUp.type === 'shield' ? '⭐ 무적' : '🕐 슬로우';
    const color = powerUp.type === 'shield' ? '#FFD700' : '#00BFFF';

    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.beginPath();
    ctx.roundRect(150, 10, 160, 36, 8);
    ctx.fill();

    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(152, 34, 156 * ratio, 10, [0, 0, 4, 4]);
    ctx.fill();

    ctx.fillStyle = color;
    ctx.font = 'bold 15px Arial';
    ctx.fillText(label, 162, 28);
  }
}

function drawStartScreen() {
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(0, 0, 800, 300);
  ctx.fillStyle = 'white';
  ctx.font = 'bold 36px Arial';
  ctx.textAlign = 'center';
  ctx.fillText('🎮 점프 히어로', 400, 120);
  ctx.font = '20px Arial';
  ctx.fillText('탭 또는 스페이스바로 시작!', 400, 165);
  ctx.font = '16px Arial';
  ctx.fillStyle = '#aaa';
  ctx.fillText('더블 점프 가능! 장애물을 피하세요!', 400, 200);
  ctx.textAlign = 'left';
}

function drawGameOver() {
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(0, 0, 800, 300);
  ctx.fillStyle = '#e94560';
  ctx.font = 'bold 48px Arial';
  ctx.textAlign = 'center';
  ctx.fillText('게임 오버!', 400, 110);
  ctx.fillStyle = 'white';
  ctx.font = '24px Arial';
  ctx.fillText(`최종 점수: ${score}`, 400, 155);
  ctx.font = '18px Arial';
  ctx.fillStyle = '#ccc';
  ctx.fillText('탭 또는 스페이스바로 다시 시작', 400, 195);
  ctx.textAlign = 'left';
}

function update() {
  if (!started || gameOver) return;

  frameCount++;
  score = Math.floor(frameCount / 6);

  if (powerUp.type) {
    powerUp.timer--;
    if (powerUp.timer <= 0) powerUp = { type: null, timer: 0, maxTimer: 0 };
  }

  const baseSpeed = Math.min(14, 4 + score * 0.008);
  speed = (powerUp.type === 'slow') ? baseSpeed * 0.45 : baseSpeed;
  obstacleInterval = Math.max(45, 90 - score * 0.04);

  player.vy += GRAVITY;
  player.y += player.vy;

  if (player.y >= GROUND_Y - player.h) {
    player.y = GROUND_Y - player.h;
    player.vy = 0;
    player.onGround = true;
    player.jumpCount = 0;
  }

  clouds.forEach(c => {
    c.x -= speed * 0.3;
    if (c.x + c.w < 0) c.x = 820 + Math.random() * 200;
  });

  mountains.forEach(m => {
    m.x -= speed * 0.15;
    if (m.x + m.w < 0) m.x = 820 + Math.random() * 200;
  });

  obstacleTimer++;
  if (obstacleTimer >= obstacleInterval) {
    spawnObstacle();
    obstacleTimer = 0;
  }

  itemTimer++;
  if (itemTimer >= itemInterval) {
    spawnItem();
    itemTimer = 0;
    itemInterval = 240 + Math.random() * 120;
  }

  for (let i = obstacles.length - 1; i >= 0; i--) {
    obstacles[i].x -= speed;
    if (obstacles[i].x + obstacles[i].w < 0) {
      obstacles.splice(i, 1);
      continue;
    }
    if (powerUp.type !== 'shield' && checkCollision(player, obstacles[i])) {
      gameOver = true;
    }
  }

  for (let i = items.length - 1; i >= 0; i--) {
    items[i].x -= speed;
    if (items[i].x + items[i].w < 0) {
      items.splice(i, 1);
      continue;
    }
    if (checkCollision(player, items[i])) {
      const t = items[i].type;
      powerUp = { type: t, timer: t === 'shield' ? 300 : 240, maxTimer: t === 'shield' ? 300 : 240 };
      for (let j = 0; j < 12; j++) {
        particles.push({
          x: items[i].x + items[i].w / 2,
          y: items[i].y + items[i].h / 2,
          vx: (Math.random() - 0.5) * 6,
          vy: (Math.random() - 0.5) * 6,
          life: 30, maxLife: 30,
          color: t === 'shield' ? '#FFD700' : '#00BFFF',
        });
      }
      items.splice(i, 1);
    }
  }

  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.life--;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function gameLoop() {
  ctx.clearRect(0, 0, 800, 300);
  drawBackground();
  drawParticles();
  obstacles.forEach(drawObstacle);
  items.forEach(drawItem);
  drawPlayer();

  if (powerUp.type === 'shield') {
    const pulse = Math.sin(Date.now() * 0.01) * 0.3 + 0.7;
    ctx.save();
    ctx.globalAlpha = pulse * 0.5;
    ctx.strokeStyle = '#FFD700';
    ctx.lineWidth = 3;
    ctx.shadowColor = '#FFD700';
    ctx.shadowBlur = 10;
    ctx.beginPath();
    ctx.ellipse(player.x + player.w / 2, player.y + player.h / 2, player.w * 0.75, player.h * 0.65, 0, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();
  }
  drawHUD();

  if (!started) drawStartScreen();
  else if (gameOver) drawGameOver();

  update();
  requestAnimationFrame(gameLoop);
}

gameLoop();
</script>
</body>
</html>
